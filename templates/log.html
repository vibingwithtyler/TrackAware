<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackVision — Event Log</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050505;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .classif-banner {
      position: fixed; left: 0; right: 0; height: 16px;
      background: #010d01; color: #00e676;
      font-family: 'Courier New', monospace; font-size: 0.48rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; user-select: none;
    }
    .classif-banner.top    { top: 0;    border-bottom: 1px solid #0a2a0a; }
    .classif-banner.bottom { bottom: 0; border-top:    1px solid #0a2a0a; }

    .mission-info {
      margin-left: auto; display: flex; flex-direction: column;
      align-items: flex-end; gap: 1px;
    }
    .mission-id      { font-size: 0.6rem; letter-spacing: 0.15em; color: #4caf50; text-transform: uppercase; }
    .mission-elapsed { font-size: 0.62rem; letter-spacing: 0.08em; color: #444; font-variant-numeric: tabular-nums; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; border-bottom: 1px solid #111; flex-shrink: 0;
    }
    header h1 { font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; }
    .header-right { display: flex; align-items: center; gap: 14px; }

    .live-wrap {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: #777;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; animation: pulse 1.2s ease-in-out infinite; }
    .live-dot.dead { background: #f44336; animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .ctrl-btn {
      background: none; border: 1px solid #2a2a2a; color: #aaa;
      font-family: 'Courier New', monospace; font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 14px; cursor: pointer; transition: all 0.15s;
    }
    .ctrl-btn:hover { border-color: #4caf50; color: #4caf50; }
    .ctrl-btn.paused { border-color: #ff9800; color: #ff9800; }

    /* ── Two-column split ── */
    .main-split { flex: 1; display: flex; overflow: hidden; }

    /* ── Diagram panel ── */
    .diagram-panel {
      flex: 0 0 40%; min-width: 180px; border-right: 1px solid #0e0e0e;
      display: flex; flex-direction: column; overflow: hidden; background: #050505;
    }
    .diag-header {
      padding: 8px 14px; border-bottom: 1px solid #0e0e0e; flex-shrink: 0;
      font-size: 0.52rem; letter-spacing: 0.22em; text-transform: uppercase; color: #2a2a2a;
    }
    .diag-scroll {
      flex: 1; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      padding: 10px;
    }

    /* ── Log panel ── */
    .log-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

    .filter-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 16px; border-bottom: 1px solid #0c0c0c; flex-shrink: 0;
    }
    .filter-label { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: #777; margin-right: 4px; }
    .filter-chip {
      font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 2px 10px; border: 1px solid #252525; color: #666;
      cursor: pointer; user-select: none; transition: all 0.15s;
    }
    .filter-chip.on-INFO  { border-color: #2a2a2a; color: #555; }
    .filter-chip.on-WARN  { border-color: #ff9800; color: #ff9800; }
    .filter-chip.on-ALERT { border-color: #f44336; color: #f44336; }
    .sep { width: 1px; height: 12px; background: #111; margin: 0 4px; }
    .source-chip {
      font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 2px 10px; border: 1px solid #252525; color: #555;
      cursor: pointer; user-select: none; transition: all 0.15s;
    }
    .source-chip.on { border-color: #3a3a3a; color: #888; }

    #log-output {
      flex: 1; overflow-y: auto; padding: 8px 16px 20px;
    }
    #log-output::-webkit-scrollbar { width: 4px; }
    #log-output::-webkit-scrollbar-track { background: #050505; }
    #log-output::-webkit-scrollbar-thumb { background: #151515; }

    .log-line { display: flex; gap: 0; line-height: 1.75; font-size: 0.72rem; }
    .log-line.hidden { display: none; }
    .log-ts    { color: #3a3a3a; white-space: nowrap; flex-shrink: 0; width: 12ch; }
    .log-source { flex-shrink: 0; width: 8ch; letter-spacing: 0.06em; }
    .log-level  { flex-shrink: 0; width: 7ch; letter-spacing: 0.06em; }
    .log-msg    { flex: 1; }

    .log-line.INFO  .log-level { color: #777; }
    .log-line.WARN  .log-level { color: #a06010; }
    .log-line.ALERT .log-level { color: #a02020; }

    .log-line[data-source="SYSTEM"] .log-source { color: #3a6a3a; }
    .log-line[data-source="DETECT"] .log-source { color: #3a4a6a; }
    .log-line[data-source="USER"]   .log-source { color: #6a6a2a; }
    .log-line[data-source="SENSOR"] .log-source { color: #6a3a6a; }

    .log-line.INFO  .log-msg { color: #999; }
    .log-line.WARN  .log-msg { color: #a06010; }
    .log-line.ALERT .log-msg { color: #a02020; }

    .log-line.INFO.fresh  .log-msg { color: #b0b0b0; }
    .log-line.WARN.fresh  .log-msg { color: #ff9800; }
    .log-line.ALERT.fresh .log-msg { color: #f44336; }
    .log-line.fresh .log-ts        { color: #555; }
    .log-line.INFO.fresh  .log-source { color: #4a8a4a; }
    .log-line[data-source="DETECT"].fresh .log-source { color: #4a6a8a; }

    .status-bar {
      padding: 4px 16px; border-top: 1px solid #0e0e0e;
      font-size: 0.58rem; letter-spacing: 0.08em; color: #666;
      display: flex; gap: 24px; flex-shrink: 0;
    }
    #stat-paused { color: #7a4800; display: none; }

    /* ── SVG diagram styles ── */
    @keyframes flow { to { stroke-dashoffset: -8; } }
    @keyframes flowCyan { to { stroke-dashoffset: -8; } }
    @keyframes nodePulse { 0%,100%{opacity:.7} 50%{opacity:1} }
  </style>
</head>
<body>
<div class="classif-banner top">UNCLASSIFIED // SIMULATION // NOT FOR OPERATIONAL USE</div>
<div class="classif-banner bottom">UNCLASSIFIED // SIMULATION // NOT FOR OPERATIONAL USE</div>

<header>
  <h1>TrackVision &mdash; Event Log</h1>
  <div class="header-right">
    <div class="live-wrap">
      <div class="live-dot" id="live-dot"></div>
      Live
    </div>
    <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">Pause</button>
    <button class="ctrl-btn" onclick="clearDisplay()">Clear</button>
  </div>
  <div class="mission-info">
    <span class="mission-id">{{ mission_id }}</span>
    <span class="mission-elapsed" id="mission-elapsed">00:00:00</span>
  </div>
</header>

<div class="main-split">

  <!-- ── Block diagram panel ── -->
  <div class="diagram-panel">
    <div class="diag-header" id="diag-header">System Architecture</div>
    <div class="diag-scroll">

      <!-- ══ SYNTHETIC mode diagram ══ -->
      <svg id="diag-synthetic" viewBox="0 0 260 440" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .s-blk rect { fill: #070f07; stroke: #4caf50; stroke-width: 1; }
            .s-blk .t   { font-family:'Courier New',monospace; fill:#4caf50; font-size:7.5px; letter-spacing:.12em; }
            .s-blk .s   { font-family:'Courier New',monospace; fill:#5a8a5a; font-size:6px; letter-spacing:.07em; }
            .s-conn { fill:none; stroke:#4caf50; stroke-width:1.5; stroke-dasharray:3 5;
                      animation: flow .7s linear infinite; }
            .s-conn.d1 { animation-delay:.2s; }
            .s-conn.d2 { animation-delay:.4s; }
            .s-conn.d3 { animation-delay:.6s; }
            .s-conn.fast { animation-duration:.45s; }
            .s-dot { fill:#4caf50; animation: nodePulse 1.6s ease-in-out infinite; }
            .s-dot.d1 { animation-delay:.5s; }
            .s-label { font-family:'Courier New',monospace; fill:#4caf50; font-size:6.5px; letter-spacing:.25em; text-transform:uppercase; }
          </style>
        </defs>

        <!-- Mode label -->
        <text x="130" y="13" text-anchor="middle" class="s-label">Synthetic Imagery</text>

        <!-- Live indicator -->
        <circle cx="130" cy="26" r="3" class="s-dot"/>

        <!-- ── Block: Frame Generator ── -->
        <g class="s-blk" transform="translate(55,36)">
          <rect x="0" y="0" width="150" height="46"/>
          <text x="75" y="14" text-anchor="middle" class="t">Frame Generator</text>
          <text x="75" y="25" text-anchor="middle" class="s">make_frame(t) · scenario engine</text>
          <text x="75" y="35" text-anchor="middle" class="s">30 FPS · 500 × 500 px</text>
        </g>

        <!-- Fork down from frame gen -->
        <line class="s-conn" x1="130" y1="82" x2="130" y2="100"/>
        <line class="s-conn" x1="65" y1="100" x2="195" y2="100"/>
        <line class="s-conn d1" x1="65"  y1="100" x2="65"  y2="116"/>
        <line class="s-conn d2" x1="195" y1="100" x2="195" y2="116"/>

        <!-- ── Block: Raw MJPEG ── -->
        <g class="s-blk" transform="translate(8,116)">
          <rect x="0" y="0" width="110" height="44"/>
          <text x="55" y="14" text-anchor="middle" class="t">Raw MJPEG</text>
          <text x="55" y="25" text-anchor="middle" class="s">/stream/raw · /stream/bg</text>
          <text x="55" y="35" text-anchor="middle" class="s">Operator · Vision Feed</text>
        </g>

        <!-- ── Block: BG Subtractor ── -->
        <g class="s-blk" transform="translate(140,116)">
          <rect x="0" y="0" width="112" height="44"/>
          <text x="56" y="14" text-anchor="middle" class="t">BG Subtractor</text>
          <text x="56" y="25" text-anchor="middle" class="s">α = 0.05 · thresh = 25</text>
          <text x="56" y="35" text-anchor="middle" class="s">Running average model</text>
        </g>

        <!-- BG Sub → join → Motion Detector -->
        <line class="s-conn d1" x1="196" y1="160" x2="196" y2="177"/>
        <line class="s-conn"    x1="130" y1="177" x2="196" y2="177"/>
        <line class="s-conn d2" x1="130" y1="177" x2="130" y2="193"/>

        <!-- ── Block: Ghost Detects ── -->
        <g class="s-blk" transform="translate(8,208)">
          <rect x="0" y="0" width="110" height="44"/>
          <text x="55" y="14" text-anchor="middle" class="t">Ghost Detects</text>
          <text x="55" y="25" text-anchor="middle" class="s">5–10s interval · 50% chance</text>
          <text x="55" y="35" text-anchor="middle" class="s">5s lifetime · TGT-002+</text>
        </g>

        <!-- ── Block: Motion Detector ── -->
        <g class="s-blk" transform="translate(55,193)">
          <rect x="0" y="0" width="150" height="44"/>
          <text x="75" y="14" text-anchor="middle" class="t">Motion Detector</text>
          <text x="75" y="25" text-anchor="middle" class="s">thresh=15 · merge_dist=20px</text>
          <text x="75" y="35" text-anchor="middle" class="s">Frame diff · blob merge</text>
        </g>

        <!-- Ghost detects merge line into SSE -->
        <line class="s-conn d3" x1="63"  y1="252" x2="63"  y2="275"/>
        <line class="s-conn"    x1="63"  y1="275" x2="130" y2="275"/>
        <line class="s-conn d1" x1="130" y1="237" x2="130" y2="275"/>
        <line class="s-conn d2" x1="130" y1="275" x2="130" y2="290"/>

        <!-- ── Block: SSE Stream ── -->
        <g class="s-blk" transform="translate(55,290)">
          <rect x="0" y="0" width="150" height="44"/>
          <text x="75" y="14" text-anchor="middle" class="t">SSE Stream</text>
          <text x="75" y="25" text-anchor="middle" class="s">/events/stream · ~15 fps</text>
          <text x="75" y="35" text-anchor="middle" class="s">detections + viewport shifts</text>
        </g>

        <!-- SSE → fork → Map + Operator -->
        <line class="s-conn fast"    x1="130" y1="334" x2="130" y2="352"/>
        <line class="s-conn fast"    x1="65"  y1="352" x2="195" y2="352"/>
        <line class="s-conn fast d1" x1="65"  y1="352" x2="65"  y2="368"/>
        <line class="s-conn fast d2" x1="195" y1="352" x2="195" y2="368"/>

        <!-- ── Block: Map View ── -->
        <g class="s-blk" transform="translate(8,368)">
          <rect x="0" y="0" width="110" height="46"/>
          <text x="55" y="14" text-anchor="middle" class="t">Map View</text>
          <text x="55" y="25" text-anchor="middle" class="s">Globe · Leaflet hybrid</text>
          <text x="55" y="35" text-anchor="middle" class="s">Geo-referenced detects</text>
        </g>

        <!-- ── Block: Operator View ── -->
        <g class="s-blk" transform="translate(140,368)">
          <rect x="0" y="0" width="112" height="46"/>
          <text x="56" y="14" text-anchor="middle" class="t">Operator View</text>
          <text x="56" y="25" text-anchor="middle" class="s">FP-1 · FP-2 · FP-3</text>
          <text x="56" y="35" text-anchor="middle" class="s">Metrics · Alert system</text>
        </g>
      </svg>

      <!-- ══ Marine mode diagram ══ (hidden by default) -->
      <svg id="diag-marine" viewBox="0 0 260 420" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <defs>
          <style>
            .m-blk rect { fill: #060a0a; stroke: #ff9800; stroke-width: 1; }
            .m-blk .t   { font-family:'Courier New',monospace; fill:#ff9800; font-size:7.5px; letter-spacing:.12em; }
            .m-blk .s   { font-family:'Courier New',monospace; fill:#bb7820; font-size:6px; letter-spacing:.07em; }
            .m-conn { fill:none; stroke:#ff9800; stroke-width:1.5; stroke-dasharray:3 5;
                      animation: flow .7s linear infinite; }
            .m-conn.d1 { animation-delay:.25s; }
            .m-conn.d2 { animation-delay:.5s; }
            .m-conn.d3 { animation-delay:.75s; }
            .m-conn.fast { animation-duration:.4s; }
            .m-dot { fill:#ff9800; animation: nodePulse 1.4s ease-in-out infinite; }
            .m-label { font-family:'Courier New',monospace; fill:#ff9800; font-size:6.5px; letter-spacing:.25em; text-transform:uppercase; }
          </style>
        </defs>

        <text x="130" y="13" text-anchor="middle" class="m-label">Ocean Traffic Mode</text>
        <circle cx="130" cy="26" r="3" class="m-dot"/>

        <g class="m-blk" transform="translate(55,36)">
          <rect x="0" y="0" width="150" height="46"/>
          <text x="75" y="14" text-anchor="middle" class="t">AIS Stream</text>
          <text x="75" y="25" text-anchor="middle" class="s">aisstream.io · WebSocket</text>
          <text x="75" y="35" text-anchor="middle" class="s">Real-time vessel positions</text>
        </g>

        <line class="m-conn" x1="130" y1="82" x2="130" y2="106"/>

        <g class="m-blk" transform="translate(55,106)">
          <rect x="0" y="0" width="150" height="44"/>
          <text x="75" y="14" text-anchor="middle" class="t">Box Filter</text>
          <text x="75" y="25" text-anchor="middle" class="s">5 km × 5 km boundary</text>
          <text x="75" y="35" text-anchor="middle" class="s">Lat/lon containment check</text>
        </g>

        <line class="m-conn d1" x1="130" y1="150" x2="130" y2="174"/>

        <g class="m-blk" transform="translate(55,174)">
          <rect x="0" y="0" width="150" height="46"/>
          <text x="75" y="14" text-anchor="middle" class="t">Vessel Matcher</text>
          <text x="75" y="25" text-anchor="middle" class="s">Speed · Name prefix</text>
          <text x="75" y="35" text-anchor="middle" class="s">Filters applied before lock</text>
        </g>

        <line class="m-conn d2" x1="130" y1="220" x2="130" y2="244"/>

        <g class="m-blk" transform="translate(55,244)">
          <rect x="0" y="0" width="150" height="46"/>
          <text x="75" y="14" text-anchor="middle" class="t">Focal Tracker</text>
          <text x="75" y="25" text-anchor="middle" class="s">Follows locked MMSI</text>
          <text x="75" y="35" text-anchor="middle" class="s">Edge-follow repoint · 20/20</text>
        </g>

        <line class="m-conn fast"    x1="130" y1="290" x2="130" y2="308"/>
        <line class="m-conn fast"    x1="65"  y1="308" x2="195" y2="308"/>
        <line class="m-conn fast d1" x1="65"  y1="308" x2="65"  y2="324"/>
        <line class="m-conn fast d2" x1="195" y1="308" x2="195" y2="324"/>

        <g class="m-blk" transform="translate(8,324)">
          <rect x="0" y="0" width="110" height="46"/>
          <text x="55" y="14" text-anchor="middle" class="t">Map View</text>
          <text x="55" y="25" text-anchor="middle" class="s">Vessel diamonds · heading</text>
          <text x="55" y="35" text-anchor="middle" class="s">Follow box · release btn</text>
        </g>

        <g class="m-blk" transform="translate(140,324)">
          <rect x="0" y="0" width="112" height="46" style="stroke:#2a2a2a;"/>
          <text x="56" y="14" text-anchor="middle" class="t" style="fill:#3a3a3a;">Synthetic Feed</text>
          <text x="56" y="25" text-anchor="middle" class="s">Suppressed in marine mode</text>
          <text x="56" y="35" text-anchor="middle" class="s">Black frame · no detects</text>
        </g>
      </svg>

      <!-- ══ ADS-B mode diagram ══ (hidden by default) -->
      <svg id="diag-adsb" viewBox="0 0 260 420" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <defs>
          <style>
            .a-blk rect { fill: #050d10; stroke: #00bcd4; stroke-width: 1; }
            .a-blk .t   { font-family:'Courier New',monospace; fill:#00bcd4; font-size:7.5px; letter-spacing:.12em; }
            .a-blk .s   { font-family:'Courier New',monospace; fill:#5aacbc; font-size:6px; letter-spacing:.07em; }
            .a-conn { fill:none; stroke:#00bcd4; stroke-width:1.5; stroke-dasharray:3 5;
                      animation: flow .7s linear infinite; }
            .a-conn.d1 { animation-delay:.25s; }
            .a-conn.d2 { animation-delay:.5s; }
            .a-conn.d3 { animation-delay:.75s; }
            .a-conn.fast { animation-duration:.4s; }
            .a-dot { fill:#00bcd4; animation: nodePulse 1.4s ease-in-out infinite; }
            .a-dot.d1 { animation-delay:.7s; }
            .a-label { font-family:'Courier New',monospace; fill:#00bcd4; font-size:6.5px; letter-spacing:.25em; text-transform:uppercase; }
            .a-blk.locked rect { stroke: #4caf50; }
            .a-blk.locked .t   { fill: #4caf50; }
          </style>
        </defs>

        <!-- Mode label -->
        <text x="130" y="13" text-anchor="middle" class="a-label">Air Traffic Mode</text>
        <circle cx="130" cy="26" r="3" class="a-dot"/>

        <!-- ── Block: ADSB Poller ── -->
        <g class="a-blk" transform="translate(55,36)">
          <rect x="0" y="0" width="150" height="46"/>
          <text x="75" y="14" text-anchor="middle" class="t">ADS-B Poller</text>
          <text x="75" y="25" text-anchor="middle" class="s">airplanes.live · adsb.lol fallback</text>
          <text x="75" y="35" text-anchor="middle" class="s">5s poll · 2.5 nm radius</text>
        </g>

        <!-- ADSB → Box Filter -->
        <line class="a-conn" x1="130" y1="82" x2="130" y2="106"/>

        <!-- ── Block: Box Filter ── -->
        <g class="a-blk" transform="translate(55,106)">
          <rect x="0" y="0" width="150" height="44"/>
          <text x="75" y="14" text-anchor="middle" class="t">Box Filter</text>
          <text x="75" y="25" text-anchor="middle" class="s">5 km × 5 km boundary</text>
          <text x="75" y="35" text-anchor="middle" class="s">Lat/lon containment check</text>
        </g>

        <!-- Box Filter → Param Matcher -->
        <line class="a-conn d1" x1="130" y1="150" x2="130" y2="174"/>

        <!-- ── Block: Param Matcher ── -->
        <g class="a-blk" transform="translate(55,174)">
          <rect x="0" y="0" width="150" height="46"/>
          <text x="75" y="14" text-anchor="middle" class="t">Param Matcher</text>
          <text x="75" y="25" text-anchor="middle" class="s">Heading · Altitude · Airline</text>
          <text x="75" y="35" text-anchor="middle" class="s">Filters applied before lock</text>
        </g>

        <!-- Param Matcher → Focal Tracker -->
        <line class="a-conn d2" x1="130" y1="220" x2="130" y2="244"/>

        <!-- ── Block: Focal Tracker ── -->
        <g class="a-blk" id="a-blk-tracker" transform="translate(55,244)">
          <rect x="0" y="0" width="150" height="46"/>
          <text x="75" y="14" text-anchor="middle" class="t">Focal Tracker</text>
          <text x="75" y="25" text-anchor="middle" class="s">Follows locked ICAO24</text>
          <text x="75" y="35" text-anchor="middle" class="s">Updates camera coords / 5s</text>
        </g>

        <!-- Focal → fork → Map + Vision Suppress -->
        <line class="a-conn fast"    x1="130" y1="290" x2="130" y2="308"/>
        <line class="a-conn fast"    x1="65"  y1="308" x2="195" y2="308"/>
        <line class="a-conn fast d1" x1="65"  y1="308" x2="65"  y2="324"/>
        <line class="a-conn fast d2" x1="195" y1="308" x2="195" y2="324"/>

        <!-- ── Block: Map View ── -->
        <g class="a-blk" transform="translate(8,324)">
          <rect x="0" y="0" width="110" height="46"/>
          <text x="55" y="14" text-anchor="middle" class="t">Map View</text>
          <text x="55" y="25" text-anchor="middle" class="s">Flight triangles · heading</text>
          <text x="55" y="35" text-anchor="middle" class="s">Follow box · release btn</text>
        </g>

        <!-- ── Block: Synthetic Suppressed ── -->
        <g class="a-blk" transform="translate(140,324)">
          <rect x="0" y="0" width="112" height="46" style="stroke:#2a2a2a;"/>
          <text x="56" y="14" text-anchor="middle" class="t" style="fill:#3a3a3a;">Synthetic Feed</text>
          <text x="56" y="25" text-anchor="middle" class="s">Suppressed in AT mode</text>
          <text x="56" y="35" text-anchor="middle" class="s">Black frame · no detects</text>
        </g>

        <!-- Lock indicator line on the right side -->
        <text x="248" y="256" text-anchor="middle" class="a-label" transform="rotate(90,248,256)" style="fill:#0a3040;font-size:5.5px;letter-spacing:.3em;">
        </text>
      </svg>

    </div>
  </div>

  <!-- ── Log panel ── -->
  <div class="log-panel">
    <div class="filter-bar">
      <span class="filter-label">Level</span>
      <span class="filter-chip on-INFO"  data-level="INFO"  onclick="toggleLevel(this)">Info</span>
      <span class="filter-chip on-WARN"  data-level="WARN"  onclick="toggleLevel(this)">Warn</span>
      <span class="filter-chip on-ALERT" data-level="ALERT" onclick="toggleLevel(this)">Alert</span>
      <div class="sep"></div>
      <span class="filter-label">Source</span>
      <span class="source-chip on" data-source="SYSTEM" onclick="toggleSource(this)">System</span>
      <span class="source-chip on" data-source="DETECT" onclick="toggleSource(this)">Detect</span>
      <span class="source-chip on" data-source="USER"   onclick="toggleSource(this)">User</span>
      <span class="source-chip on" data-source="SENSOR" onclick="toggleSource(this)">Sensor</span>
    </div>

    <div id="log-output"></div>

    <div class="status-bar">
      <span id="stat-count">0 events</span>
      <span id="stat-paused">— PAUSED</span>
    </div>
  </div>

</div><!-- end main-split -->

<script>
  const output   = document.getElementById('log-output');
  const pauseBtn = document.getElementById('pause-btn');
  const liveDot  = document.getElementById('live-dot');

  let paused     = false;
  let totalCount = 0;
  let pending    = [];

  const activeLevels  = new Set(['INFO', 'WARN', 'ALERT']);
  const activeSources = new Set(['SYSTEM', 'DETECT', 'USER', 'SENSOR']);

  function lineVisible(level, source) {
    return activeLevels.has(level) && activeSources.has(source);
  }

  function togglePause() {
    paused = !paused;
    pauseBtn.classList.toggle('paused', paused);
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    document.getElementById('stat-paused').style.display = paused ? '' : 'none';
    if (!paused && pending.length) {
      const wasBottom = isAtBottom();
      pending.forEach(appendLine);
      pending = [];
      if (wasBottom) scrollBottom();
    }
  }

  function clearDisplay() {
    output.innerHTML = '';
    totalCount = 0;
    updateCount();
  }

  function toggleLevel(chip) {
    const level = chip.dataset.level;
    if (activeLevels.has(level)) {
      activeLevels.delete(level);
      chip.className = 'filter-chip';
    } else {
      activeLevels.add(level);
      chip.className = `filter-chip on-${level}`;
    }
    refilter();
  }

  function toggleSource(chip) {
    const src = chip.dataset.source;
    if (activeSources.has(src)) {
      activeSources.delete(src);
      chip.classList.remove('on');
    } else {
      activeSources.add(src);
      chip.classList.add('on');
    }
    refilter();
  }

  function refilter() {
    document.querySelectorAll('.log-line').forEach(el => {
      const show = activeLevels.has(el.dataset.level) && activeSources.has(el.dataset.source);
      el.classList.toggle('hidden', !show);
    });
  }

  function appendLine(evt) {
    totalCount++;
    updateCount();
    const line = document.createElement('div');
    line.className = `log-line ${evt.level} fresh`;
    line.dataset.level  = evt.level;
    line.dataset.source = evt.source;
    if (!lineVisible(evt.level, evt.source)) line.classList.add('hidden');
    line.innerHTML =
      `<span class="log-ts">${evt.ts}</span>` +
      `<span class="log-source">${evt.source}</span>` +
      `<span class="log-level">${evt.level}</span>` +
      `<span class="log-msg">${escHtml(evt.msg)}</span>`;
    output.appendChild(line);
    setTimeout(() => line.classList.remove('fresh'), 2500);
    while (output.children.length > 3000) output.removeChild(output.firstChild);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function isAtBottom() {
    return output.scrollHeight - output.scrollTop - output.clientHeight < 60;
  }

  function scrollBottom() { output.scrollTop = output.scrollHeight; }

  function updateCount() {
    document.getElementById('stat-count').textContent =
      `${totalCount} event${totalCount !== 1 ? 's' : ''}`;
  }

  // ── Log polling ────────────────────────────────────────────────────────────
  let cursor = 0;
  let knownServerId = null;

  async function pollLog() {
    try {
      const r = await fetch(`/log/poll?after=${cursor}`);
      if (!r.ok) throw new Error('bad response');
      const { events, server_id } = await r.json();

      if (server_id !== knownServerId) {
        if (knownServerId !== null) { clearDisplay(); cursor = 0; }
        knownServerId = server_id;
      }

      liveDot.classList.remove('dead');

      if (events.length > 0) {
        const wasBottom = isAtBottom();
        events.forEach(evt => {
          cursor = evt.seq;
          if (paused) pending.push(evt);
          else        appendLine(evt);
        });
        if (!paused && wasBottom) scrollBottom();
      }
    } catch (e) {
      liveDot.classList.add('dead');
    }
  }

  pollLog();
  setInterval(pollLog, 500);

  output.addEventListener('scroll', () => {
    if (!isAtBottom() && !paused) {
      paused = true;
      pauseBtn.classList.add('paused');
      pauseBtn.textContent = 'Resume';
      document.getElementById('stat-paused').style.display = '';
    }
  });

  // ── Diagram mode toggle ────────────────────────────────────────────────────
  const diagSynth  = document.getElementById('diag-synthetic');
  const diagAdsb   = document.getElementById('diag-adsb');
  const diagMarine = document.getElementById('diag-marine');
  const diagHeader = document.getElementById('diag-header');

  let diagMode = 'synthetic';

  function setDiagMode(mode) {
    if (mode === diagMode) return;
    diagMode = mode;
    diagSynth.style.display  = mode === 'synthetic' ? 'block' : 'none';
    diagAdsb.style.display   = mode === 'adsb'      ? 'block' : 'none';
    diagMarine.style.display = mode === 'marine'    ? 'block' : 'none';
    if (mode === 'adsb') {
      diagHeader.textContent = 'Air Traffic Architecture';
      diagHeader.style.color = '#0a3a4a';
    } else if (mode === 'marine') {
      diagHeader.textContent = 'Ocean Traffic Architecture';
      diagHeader.style.color = '#4a2a00';
    } else {
      diagHeader.textContent = 'System Architecture';
      diagHeader.style.color = '#2a2a2a';
    }
  }

  async function checkDiagMode() {
    try {
      const [adsbRes, marineRes] = await Promise.all([
        fetch('/adsb/flights'),
        fetch('/marine/vessels'),
      ]);
      const adsb   = await adsbRes.json();
      const marine = await marineRes.json();
      if (marine.active)    setDiagMode('marine');
      else if (adsb.active) setDiagMode('adsb');
      else                  setDiagMode('synthetic');
    } catch (_) {}
  }

  checkDiagMode();
  setInterval(checkDiagMode, 5000);

  // ── Mission elapsed timer ─────────────────────────────────────────────────
  (function() {
    const start = {{ started_at }};
    function tick() {
      const s  = Math.max(0, Math.floor(Date.now() / 1000 - start));
      const hh = String(Math.floor(s / 3600)).padStart(2, '0');
      const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      document.getElementById('mission-elapsed').textContent = `${hh}:${mm}:${ss}`;
    }
    tick(); setInterval(tick, 1000);
  })();
</script>
</body>
</html>
