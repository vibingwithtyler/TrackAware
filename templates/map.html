<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackAware — Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .classif-banner {
      position: fixed; left: 0; right: 0; height: 16px;
      background: #010d01; color: #00e676;
      font-family: 'Courier New', monospace; font-size: 0.48rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; user-select: none;
    }
    .classif-banner.top    { top: 0;    border-bottom: 1px solid #0a2a0a; }
    .classif-banner.bottom { bottom: 0; border-top:    1px solid #0a2a0a; }

    .mission-info {
      margin-left: auto; display: flex; flex-direction: column;
      align-items: flex-end; gap: 1px;
    }
    .mission-id      { font-size: 0.6rem; letter-spacing: 0.15em; color: #4caf50; text-transform: uppercase; }
    .mission-elapsed { font-size: 0.62rem; letter-spacing: 0.08em; color: #444; font-variant-numeric: tabular-nums; }

    header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 20px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }
    header h1 { font-size: 0.9rem; letter-spacing: 0.2em; text-transform: uppercase; color: #666; }

    .tabs { display: flex; gap: 4px; }
    .tab {
      background: none; border: 1px solid #2a2a2a; color: #555;
      font-family: 'Courier New', monospace; font-size: 0.72rem;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 14px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .tab:hover  { border-color: #444; color: #aaa; }
    .tab.active { border-color: #4caf50; color: #4caf50; }

    .tab-content { display: none; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* ── Map View tab ── */
    #tab-map { flex-direction: row; }

    /* ── Both map containers ── */
    #map-main, #map-vid {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #050c14;
    }

    .leaf-pane {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .leaf-pane.visible { opacity: 1; pointer-events: auto; }

    #globe-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: grab;
      transition: opacity 0.25s;
      display: block;
    }
    #globe-canvas.hidden { opacity: 0; pointer-events: none; }

    .leaflet-control-attribution {
      background: rgba(10,10,10,0.7) !important;
      color: #333 !important;
      font-size: 0.5rem !important;
    }
    .leaflet-control-attribution a { color: #444 !important; }
    .leaflet-control-zoom a {
      background: #111 !important; color: #555 !important;
      border-color: #222 !important;
    }
    .leaflet-control-zoom a:hover { background: #1a1a1a !important; color: #888 !important; }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px; flex-shrink: 0; border-left: 1px solid #1e1e1e;
      padding: 20px 16px; display: flex; flex-direction: column; gap: 14px;
    }
    .sidebar h2 { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #555; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
    .field input {
      background: #111; border: 1px solid #2a2a2a; color: #ddd;
      font-family: 'Courier New', monospace; font-size: 0.8rem;
      padding: 6px 8px; width: 100%; outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: #4caf50; }
    .apply-btn {
      background: none; border: 1px solid #4caf50; color: #4caf50;
      font-family: 'Courier New', monospace; font-size: 0.72rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 7px 0; cursor: pointer; width: 100%; transition: background 0.15s;
    }
    .apply-btn:hover { background: #4caf5018; }
    .coord-display { font-size: 0.65rem; color: #444; letter-spacing: 0.05em; line-height: 1.6; }
    .zoom-hint { font-size: 0.58rem; color: #252525; letter-spacing: 0.06em; line-height: 1.7; }

    /* ── Zoom overlay buttons ── */
    .zoom-controls {
      position: absolute;
      top: 12px; left: 12px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .zoom-btn {
      width: 28px; height: 28px;
      background: rgba(10,10,10,0.88);
      border: 1px solid #2a2a2a;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 1.05rem; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .zoom-btn:hover  { border-color: #4caf50; color: #4caf50; }
    .zoom-btn:active { background: rgba(76,175,80,0.1); }
    #mode-badge {
      font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: #2a2a2a; border: 1px solid #1a1a1a; padding: 3px 8px; text-align: center;
    }

    /* ── Live tab ── */
    #tab-vid { flex-direction: row; position: relative; }
    #map-vid  { flex: 1; }

    .hud {
      position: absolute; top: 12px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; align-items: center;
      background: #0d0d0dee; border: 1px solid #2a2a2a;
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #555; padding: 5px 16px; pointer-events: none; z-index: 1000;
      white-space: nowrap;
    }
    .hud-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #4caf50;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
<div class="classif-banner top">UNCLASSIFIED // SIMULATION // NOT FOR OPERATIONAL USE</div>
<div class="classif-banner bottom">UNCLASSIFIED // SIMULATION // NOT FOR OPERATIONAL USE</div>

<header>
  <h1>TrackAware</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('vid', event)">Live</button>
    <button class="tab"        onclick="switchTab('map', event)">Map View</button>
  </div>
  <div class="mission-info">
    <span class="mission-id">{{ mission_id }}</span>
    <span class="mission-elapsed" id="mission-elapsed">00:00:00</span>
  </div>
</header>

<!-- Map View tab -->
<div id="tab-map" class="tab-content">
  <div id="map-main">
    <div id="leaf-main" class="leaf-pane"></div>
    <!-- #globe-canvas placed here by JS -->
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="mapZoomIn()">+</button>
      <button class="zoom-btn" onclick="mapZoomOut()">&minus;</button>
    </div>
  </div>
  <div class="sidebar">
    <h2>Camera Location</h2>
    <div class="field">
      <label>Latitude</label>
      <input id="inp-lat" type="number" step="0.0001" value="34.1425">
    </div>
    <div class="field">
      <label>Longitude</label>
      <input id="inp-lon" type="number" step="0.0001" value="-118.2551">
    </div>
    <button class="apply-btn" onclick="applyCoords()">Apply</button>
    <div class="coord-display" id="coord-display">Glendale, CA</div>
    <div id="mode-badge">Globe</div>
    <div class="zoom-hint">Drag to rotate · Scroll to zoom<br>Tiles load when zoomed in</div>
  </div>
</div>

<!-- Live tab -->
<div id="tab-vid" class="tab-content active">
  <div class="hud">
    <div class="hud-dot"></div>
    Live
    <span id="map-lock-label" style="color:#4caf50;margin-left:10px;"></span>
  </div>
  <button id="map-release-btn" onclick="mapReleaseFollow()" style="display:none;position:absolute;top:50px;left:50%;transform:translateX(-50%);background:none;border:1px solid #f44336;color:#f44336;font-family:'Courier New',monospace;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;padding:5px 16px;cursor:pointer;z-index:1000;pointer-events:auto;">⊗ Release Target</button>
  <button id="map-marine-release-btn" onclick="mapMarineReleaseFollow()" style="display:none;position:absolute;top:50px;left:50%;transform:translateX(-50%);background:none;border:1px solid #ff9800;color:#ff9800;font-family:'Courier New',monospace;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;padding:5px 16px;cursor:pointer;z-index:1000;pointer-events:auto;">⊗ Release Target</button>
  <div id="map-vid">
    <div id="leaf-vid" class="leaf-pane"></div>
    <!-- canvas also placed here on tab switch -->
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="mapZoomIn()">+</button>
      <button class="zoom-btn" onclick="mapZoomOut()">&minus;</button>
    </div>
  </div>
</div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const STORAGE_KEY  = 'trackvision_camera_coords';
  const BOX_KM       = 5;
  const GLENDALE     = { lat: 34.1425, lon: -118.2551 };

  // Globe ↔ map mode thresholds
  const GLOBE_TO_MAP = 14000;
  const MAP_TO_GLOBE = 7;

  // ── State ──────────────────────────────────────────────────────────────────
  let currentCoords  = loadCoords();
  let mode           = 'globe';
  let activeTab      = 'vid';
  let globeAnimating = false;

  // ADS-B state
  let adsbFlights    = [];
  let adsbFollowIcao = null;
  const flightMarkers = new Map();

  // Marine state
  let marineVessels    = [];
  let marineFollowMmsi = null;
  const vesselMarkers  = new Map();

  // ── Geo helpers ───────────────────────────────────────────────────────────
  function kmToDegLat(km) { return km / 111.32; }
  function kmToDegLon(km, lat) { return km / (111.32 * Math.cos(lat * Math.PI / 180)); }

  function boxGeoJSON(lat, lon) {
    const hLat = kmToDegLat(BOX_KM / 2), hLon = kmToDegLon(BOX_KM / 2, lat);
    return {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [lon - hLon, lat - hLat], [lon + hLon, lat - hLat],
          [lon + hLon, lat + hLat], [lon - hLon, lat + hLat],
          [lon - hLon, lat - hLat],
        ]],
      },
    };
  }

  function leafBounds(lat, lon) {
    const hLat = kmToDegLat(BOX_KM / 2), hLon = kmToDegLon(BOX_KM / 2, lat);
    return [[lat - hLat, lon - hLon], [lat + hLat, lon + hLon]];
  }

  // ── D3 Globe ───────────────────────────────────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.id = 'globe-canvas';

  const projection = d3.geoOrthographic()
    .clipAngle(90).precision(0.3)
    .rotate([-currentCoords.lon, -currentCoords.lat, 0]);

  const graticuleData = d3.geoGraticule()();
  let landData = null, bordersData = null;
  let currentGeoBox = boxGeoJSON(currentCoords.lat, currentCoords.lon);

  function draw() {
    const ctx  = canvas.getContext('2d');
    const w    = canvas.width, h = canvas.height;
    const path = d3.geoPath().projection(projection).context(ctx);
    ctx.clearRect(0, 0, w, h);

    ctx.beginPath(); path({ type: 'Sphere' });
    ctx.fillStyle = '#050c14'; ctx.fill();

    ctx.beginPath(); path(graticuleData);
    ctx.strokeStyle = 'rgba(15,35,55,0.7)'; ctx.lineWidth = 0.4; ctx.stroke();

    if (landData) {
      ctx.beginPath(); path(landData);
      ctx.fillStyle = '#0d1a0e'; ctx.fill();
    }
    if (bordersData) {
      ctx.beginPath(); path(bordersData);
      ctx.strokeStyle = '#1a3040'; ctx.lineWidth = 0.5; ctx.stroke();
    }

    ctx.beginPath(); path(currentGeoBox);
    ctx.strokeStyle = '#2196f3'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = 'rgba(33,150,243,0.08)'; ctx.fill();

    const cam = projection([currentCoords.lon, currentCoords.lat]);
    if (cam) {
      ctx.strokeStyle = 'rgba(33,150,243,0.55)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cam[0]-8, cam[1]); ctx.lineTo(cam[0]+8, cam[1]);
      ctx.moveTo(cam[0], cam[1]-8); ctx.lineTo(cam[0], cam[1]+8);
      ctx.stroke();
    }

    // ADS-B flights
    adsbFlights.forEach(f => {
      const p = projection([f.lon, f.lat]);
      if (!p) return;
      const [fx, fy] = p;
      const locked   = f.icao24 === adsbFollowIcao;
      const color    = locked ? '#4caf50' : '#00bcd4';
      const hdgRad   = ((f.heading || 0) * Math.PI) / 180;
      ctx.save();
      ctx.translate(fx, fy);
      ctx.rotate(hdgRad);
      ctx.beginPath();
      ctx.moveTo(0, -6); ctx.lineTo(-3.5, 4); ctx.lineTo(3.5, 4);
      ctx.closePath();
      ctx.fillStyle = color; ctx.fill();
      ctx.restore();
      if (f.callsign) {
        ctx.font = '9px Courier New'; ctx.fillStyle = color;
        ctx.fillText(f.callsign, fx + 8, fy + 3);
      }
    });

    // Marine vessels
    marineVessels.forEach(v => {
      const p = projection([v.lon, v.lat]);
      if (!p) return;
      const [vx, vy] = p;
      const locked  = v.mmsi === marineFollowMmsi;
      const color   = locked ? '#4caf50' : '#ff9800';
      const hdg     = (v.heading !== null && v.heading !== undefined) ? v.heading : (v.cog || 0);
      const hdgRad  = hdg * Math.PI / 180;
      ctx.save();
      ctx.translate(vx, vy);
      ctx.rotate(hdgRad);
      ctx.beginPath();
      ctx.moveTo(0, -5); ctx.lineTo(4, 0); ctx.lineTo(0, 5); ctx.lineTo(-4, 0);
      ctx.closePath();
      ctx.fillStyle = color; ctx.fill();
      ctx.restore();
      if (v.name) {
        ctx.font = '9px Courier New'; ctx.fillStyle = color;
        ctx.fillText(v.name, vx + 8, vy + 3);
      }
    });

    ctx.beginPath(); path({ type: 'Sphere' });
    ctx.strokeStyle = 'rgba(25,65,120,0.35)'; ctx.lineWidth = 4; ctx.stroke();
    ctx.strokeStyle = 'rgba(30,60,100,0.7)';  ctx.lineWidth = 1; ctx.stroke();
  }

  function resizeGlobe() {
    const p = canvas.parentElement;
    if (!p) return;
    const w = p.clientWidth, h = p.clientHeight;
    if (!w || !h) return;
    canvas.width  = w;
    canvas.height = h;
    if (!canvas._initScale) {
      projection.scale(Math.min(w, h) * 0.44);
      canvas._initScale = true;
    }
    projection.translate([w / 2, h / 2]);
    draw();
  }

  // Drag
  let dragging = false, dragStart, rotStart;
  canvas.addEventListener('mousedown', e => {
    if (globeAnimating) return;
    dragging = true; dragStart = [e.clientX, e.clientY];
    rotStart = projection.rotate().slice();
    canvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const s = projection.scale();
    projection.rotate([
      rotStart[0] + (e.clientX - dragStart[0]) * 90 / s,
      rotStart[1] - (e.clientY - dragStart[1]) * 90 / s,
    ]);
    draw();
  });
  window.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });

  // Scroll — zoom or transition to Leaflet
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const newScale = Math.max(80, projection.scale() * (e.deltaY > 0 ? 0.85 : 1.18));
    projection.scale(newScale);
    if (newScale >= GLOBE_TO_MAP) {
      switchToMap();
    } else {
      draw();
    }
  }, { passive: false });

  // Fly-to animation
  function flyTo(lat, lon) {
    globeAnimating = true; canvas.style.cursor = 'wait';
    const r0 = projection.rotate(), r1 = [-lon, -lat, 0];
    const s0 = projection.scale();
    const regional = Math.min(canvas.width, canvas.height) * 3;
    const s1 = s0 < regional ? regional : s0;
    const iR = d3.interpolate(r0, r1), iS = d3.interpolateNumber(s0, s1);
    const dur = 1200; let t0 = null;
    (function step(ts) {
      if (!t0) t0 = ts;
      const t = Math.min((ts - t0) / dur, 1), e = d3.easeCubicInOut(t);
      projection.rotate(iR(e)).scale(iS(e));
      if (projection.scale() >= GLOBE_TO_MAP) { switchToMap(); return; }
      draw();
      if (t < 1) requestAnimationFrame(step);
      else { globeAnimating = false; canvas.style.cursor = 'grab'; }
    })(performance.now());
  }

  // World data
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(world => {
    landData    = topojson.feature(world, world.objects.land);
    bordersData = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
    draw();
  });

  // ── Leaflet maps ───────────────────────────────────────────────────────────
  const TILE_URL  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
  const TILE_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>';

  const leafMain = L.map('leaf-main', { zoomControl: false });
  const leafVid  = L.map('leaf-vid',  { zoomControl: false });
  [leafMain, leafVid].forEach(m => L.tileLayer(TILE_URL, { attribution: TILE_ATTR, maxZoom: 19 }).addTo(m));

  const boxStyle = { color: '#2196f3', weight: 2, fillColor: '#2196f3', fillOpacity: 0.08 };
  let rectMain = null, rectVid = null;

  const flightLayerMain = L.layerGroup().addTo(leafMain);
  const flightLayerVid  = L.layerGroup().addTo(leafVid);
  const vesselLayerMain = L.layerGroup().addTo(leafMain);
  const vesselLayerVid  = L.layerGroup().addTo(leafVid);

  function makeVesselIcon(heading, locked) {
    const color = locked ? '#4caf50' : '#ff9800';
    const h     = (heading !== null && heading !== undefined) ? heading : 0;
    return L.divIcon({
      className: '',
      html: `<svg width="14" height="14" viewBox="-7 -7 14 14" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;transform:rotate(${h}deg)">
        <polygon points="0,-6 5,0 0,6 -5,0" fill="${color}"/>
      </svg>`,
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
  }

  function makeFlightIcon(heading, locked) {
    const color = locked ? '#4caf50' : '#00bcd4';
    const h     = heading || 0;
    return L.divIcon({
      className: '',
      html: `<svg width="16" height="16" viewBox="-8 -8 16 16" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;transform:rotate(${h}deg)">
        <polygon points="0,-7 -4,5 4,5" fill="${color}"/>
      </svg>`,
      iconSize: [16, 16], iconAnchor: [8, 8],
    });
  }

  function updateLeafletBox(lat, lon, fit = false) {
    const bounds = leafBounds(lat, lon);
    if (rectMain) leafMain.removeLayer(rectMain);
    if (rectVid)  leafVid.removeLayer(rectVid);
    rectMain = L.rectangle(bounds, boxStyle).addTo(leafMain);
    rectVid  = L.rectangle(bounds, boxStyle).addTo(leafVid);
    if (fit) {
      leafMain.fitBounds(bounds, { padding: [40, 40] });
      leafVid.fitBounds(bounds,  { padding: [40, 40] });
    }
  }

  // Zoom out in Leaflet → back to globe
  [leafMain, leafVid].forEach(leaf => {
    leaf.on('zoomend', () => {
      if (mode === 'map' && leaf.getZoom() < MAP_TO_GLOBE) switchToGlobe(leaf);
    });
  });

  // ── Mode switching ─────────────────────────────────────────────────────────
  function d3ScaleToLeafZoom(scale) {
    return Math.min(18, Math.max(1, Math.round(Math.log2(2 * Math.PI * scale / 256))));
  }
  function leafZoomToD3Scale(zoom) {
    return 256 * Math.pow(2, zoom) / (2 * Math.PI);
  }

  function switchToMap() {
    if (mode === 'map') return;
    mode = 'map';
    globeAnimating = false;

    const rot  = projection.rotate();
    const lat  = -rot[1], lon = -rot[0];
    const zoom = d3ScaleToLeafZoom(projection.scale());

    leafMain.setView([lat, lon], zoom, { animate: false });
    leafVid.setView( [lat, lon], zoom, { animate: false });
    updateLeafletBox(currentCoords.lat, currentCoords.lon, false);

    document.getElementById('leaf-main').classList.add('visible');
    document.getElementById('leaf-vid').classList.add('visible');
    canvas.classList.add('hidden');

    document.getElementById('mode-badge').textContent = 'Map';
    setTimeout(() => { leafMain.invalidateSize(); leafVid.invalidateSize(); }, 30);
  }

  function switchToGlobe(fromLeaf) {
    if (mode === 'globe') return;
    mode = 'globe';

    const center = fromLeaf.getCenter();
    const scale  = leafZoomToD3Scale(fromLeaf.getZoom());
    projection.rotate([-center.lng, -center.lat, 0]).scale(scale);

    document.getElementById('leaf-main').classList.remove('visible');
    document.getElementById('leaf-vid').classList.remove('visible');
    canvas.classList.remove('hidden');

    document.getElementById('mode-badge').textContent = 'Globe';
    const target = document.getElementById(activeTab === 'map' ? 'map-main' : 'map-vid');
    target.appendChild(canvas);
    delete canvas._initScale;
    resizeGlobe();
  }

  function setModeBadge() {
    document.getElementById('mode-badge').textContent = mode === 'globe' ? 'Globe' : 'Map';
  }

  // ── Zoom buttons ───────────────────────────────────────────────────────────
  function mapZoomIn() {
    if (mode === 'globe') {
      const newScale = projection.scale() * 1.4;
      projection.scale(newScale);
      if (newScale >= GLOBE_TO_MAP) switchToMap();
      else draw();
    } else {
      leafMain.zoomIn(); leafVid.zoomIn();
    }
  }
  function mapZoomOut() {
    if (mode === 'globe') {
      projection.scale(Math.max(80, projection.scale() / 1.4));
      draw();
    } else {
      leafMain.zoomOut(); leafVid.zoomOut();
    }
  }

  // ── ADS-B polling ─────────────────────────────────────────────────────────
  function updateFlightMarkers() {
    const seen = new Set(adsbFlights.map(f => f.icao24));
    flightMarkers.forEach((pair, icao) => {
      if (!seen.has(icao)) {
        flightLayerMain.removeLayer(pair.main);
        flightLayerVid.removeLayer(pair.vid);
        flightMarkers.delete(icao);
      }
    });
    adsbFlights.forEach(f => {
      const locked = f.icao24 === adsbFollowIcao;
      const icon   = makeFlightIcon(f.heading, locked);
      if (flightMarkers.has(f.icao24)) {
        const pair = flightMarkers.get(f.icao24);
        pair.main.setLatLng([f.lat, f.lon]).setIcon(icon);
        pair.vid.setLatLng([f.lat, f.lon]).setIcon(icon);
      } else {
        const mkMain = L.marker([f.lat, f.lon], { icon, interactive: false }).addTo(flightLayerMain);
        const mkVid  = L.marker([f.lat, f.lon], { icon, interactive: false }).addTo(flightLayerVid);
        flightMarkers.set(f.icao24, { main: mkMain, vid: mkVid });
      }
    });
  }

  async function pollADSB() {
    try {
      const res  = await fetch('/adsb/flights');
      const data = await res.json();
      if (!data.active) {
        if (adsbFlights.length) {
          adsbFlights = []; adsbFollowIcao = null;
          flightMarkers.forEach(p => { flightLayerMain.removeLayer(p.main); flightLayerVid.removeLayer(p.vid); });
          flightMarkers.clear();
          if (mode === 'globe') draw();
          document.getElementById('map-release-btn').style.display = 'none';
          document.getElementById('map-lock-label').textContent = '';
        }
        return;
      }

      adsbFlights    = data.flights || [];
      adsbFollowIcao = data.follow_icao || null;

      if (data.follow_icao && data.center) {
        const { lat, lon } = data.center;
        if (lat !== currentCoords.lat || lon !== currentCoords.lon) {
          currentCoords = { lat, lon };
          saveCoords(lat, lon);
          currentGeoBox = boxGeoJSON(lat, lon);
          if (mode === 'globe') draw();
          else updateLeafletBox(lat, lon, false);
        }
      }

      updateFlightMarkers();
      if (mode === 'globe') draw();

      document.getElementById('map-release-btn').style.display = adsbFollowIcao ? '' : 'none';
      const f = adsbFlights.find(f => f.icao24 === adsbFollowIcao);
      document.getElementById('map-lock-label').textContent = adsbFollowIcao
        ? `LOCKED: ${adsbFollowIcao}${f?.callsign ? ' / ' + f.callsign : ''}`
        : '';
      document.getElementById('map-lock-label').style.color = '#4caf50';
    } catch (_) {}
  }

  // ── Marine polling ────────────────────────────────────────────────────────
  function updateVesselMarkers() {
    const seen = new Set(marineVessels.map(v => v.mmsi));
    vesselMarkers.forEach((pair, mmsi) => {
      if (!seen.has(mmsi)) {
        vesselLayerMain.removeLayer(pair.main);
        vesselLayerVid.removeLayer(pair.vid);
        vesselMarkers.delete(mmsi);
      }
    });
    marineVessels.forEach(v => {
      const locked = v.mmsi === marineFollowMmsi;
      const hdg    = v.heading !== null && v.heading !== undefined ? v.heading : v.cog;
      const icon   = makeVesselIcon(hdg, locked);
      if (vesselMarkers.has(v.mmsi)) {
        const pair = vesselMarkers.get(v.mmsi);
        pair.main.setLatLng([v.lat, v.lon]).setIcon(icon);
        pair.vid.setLatLng([v.lat, v.lon]).setIcon(icon);
      } else {
        const mkMain = L.marker([v.lat, v.lon], { icon, interactive: false }).addTo(vesselLayerMain);
        const mkVid  = L.marker([v.lat, v.lon], { icon, interactive: false }).addTo(vesselLayerVid);
        vesselMarkers.set(v.mmsi, { main: mkMain, vid: mkVid });
      }
    });
  }

  async function pollMarine() {
    try {
      const res  = await fetch('/marine/vessels');
      const data = await res.json();
      if (!data.active) {
        if (marineVessels.length) {
          marineVessels = []; marineFollowMmsi = null;
          vesselMarkers.forEach(p => { vesselLayerMain.removeLayer(p.main); vesselLayerVid.removeLayer(p.vid); });
          vesselMarkers.clear();
          if (mode === 'globe') draw();
        }
        document.getElementById('map-marine-release-btn').style.display = 'none';
        return;
      }

      marineVessels    = data.vessels || [];
      marineFollowMmsi = data.follow_mmsi || null;

      if (data.follow_mmsi && data.center) {
        const { lat, lon } = data.center;
        if (lat !== currentCoords.lat || lon !== currentCoords.lon) {
          currentCoords = { lat, lon };
          saveCoords(lat, lon);
          currentGeoBox = boxGeoJSON(lat, lon);
          if (mode === 'globe') draw();
          else updateLeafletBox(lat, lon, false);
        }
      }

      updateVesselMarkers();
      if (mode === 'globe') draw();

      document.getElementById('map-marine-release-btn').style.display = marineFollowMmsi ? '' : 'none';
      const v = marineVessels.find(v => v.mmsi === marineFollowMmsi);
      document.getElementById('map-lock-label').textContent = marineFollowMmsi
        ? `LOCKED: ${marineFollowMmsi}${v?.name ? ' / ' + v.name : ''}`
        : '';
      document.getElementById('map-lock-label').style.color = '#ff9800';
    } catch (_) {}
  }

  setInterval(pollADSB, 5000);
  setInterval(pollMarine, 5000);

  // ── Coord management ──────────────────────────────────────────────────────
  function loadCoords() {
    try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (s?.lat && s?.lon) return s; }
    catch (_) {}
    return { ...GLENDALE };
  }
  function saveCoords(lat, lon) { localStorage.setItem(STORAGE_KEY, JSON.stringify({ lat, lon })); }
  function updateDisplay(lat, lon) {
    document.getElementById('coord-display').textContent =
      `${lat.toFixed(4)}° N, ${Math.abs(lon).toFixed(4)}° ${lon < 0 ? 'W' : 'E'}`;
  }

  function applyCoords() {
    const lat = parseFloat(document.getElementById('inp-lat').value);
    const lon = parseFloat(document.getElementById('inp-lon').value);
    if (isNaN(lat) || isNaN(lon)) return;
    currentCoords = { lat, lon };
    saveCoords(lat, lon); updateDisplay(lat, lon);
    currentGeoBox = boxGeoJSON(lat, lon);
    if (mode === 'globe') {
      flyTo(lat, lon);
    } else {
      leafMain.setView([lat, lon], leafMain.getZoom());
      leafVid.setView( [lat, lon], leafVid.getZoom());
      updateLeafletBox(lat, lon, false);
    }
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  function switchTab(name, evt) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    evt.target.classList.add('active');
    activeTab = name;
    if (mode === 'globe') {
      const target = document.getElementById(name === 'map' ? 'map-main' : 'map-vid');
      target.appendChild(canvas);
      delete canvas._initScale;
      setTimeout(resizeGlobe, 10);
    } else {
      setTimeout(() => {
        if (name === 'map') leafMain.invalidateSize();
        else                leafVid.invalidateSize();
      }, 30);
    }
  }

  // ── Cross-window coord sync ───────────────────────────────────────────────
  window.addEventListener('storage', e => {
    if (e.key !== STORAGE_KEY) return;
    const { lat, lon } = JSON.parse(e.newValue);
    currentCoords = { lat, lon };
    document.getElementById('inp-lat').value = lat;
    document.getElementById('inp-lon').value = lon;
    updateDisplay(lat, lon);
    currentGeoBox = boxGeoJSON(lat, lon);
    if (mode === 'globe') draw();
    else updateLeafletBox(lat, lon, false);
  });

  // ── Release handlers ──────────────────────────────────────────────────────
  async function mapReleaseFollow() {
    await fetch('/adsb/follow', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ icao24: null }),
    });
    adsbFollowIcao = null;
    document.getElementById('map-release-btn').style.display = 'none';
    document.getElementById('map-lock-label').textContent = '';
    updateFlightMarkers();
  }

  async function mapMarineReleaseFollow() {
    await fetch('/marine/follow', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mmsi: null }),
    });
    marineFollowMmsi = null;
    document.getElementById('map-marine-release-btn').style.display = 'none';
    document.getElementById('map-lock-label').textContent = '';
    updateVesselMarkers();
    if (mode === 'globe') draw();
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  document.getElementById('inp-lat').value = currentCoords.lat;
  document.getElementById('inp-lon').value = currentCoords.lon;
  updateDisplay(currentCoords.lat, currentCoords.lon);
  document.getElementById('map-vid').appendChild(canvas);
  window.addEventListener('resize', resizeGlobe);
  resizeGlobe();

  // ── Mission elapsed timer ─────────────────────────────────────────────────
  (function() {
    const start = {{ started_at }};
    function tick() {
      const s  = Math.max(0, Math.floor(Date.now() / 1000 - start));
      const hh = String(Math.floor(s / 3600)).padStart(2, '0');
      const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      document.getElementById('mission-elapsed').textContent = `${hh}:${mm}:${ss}`;
    }
    tick(); setInterval(tick, 1000);
  })();
</script>
</body>
</html>
