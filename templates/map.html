<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackAware — Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .classif-banner {
      position: fixed; left: 0; right: 0; height: 16px;
      background: #010d01; color: #00e676;
      font-family: 'Courier New', monospace; font-size: 0.48rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; user-select: none;
    }
    .classif-banner.top    { top: 0;    border-bottom: 1px solid #0a2a0a; }
    .classif-banner.bottom { bottom: 0; border-top:    1px solid #0a2a0a; }

    header {
      display: flex; align-items: center; gap: 24px;
      padding: 10px 20px; border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    header h1 { font-size: 0.9rem; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; }

    .mission-info {
      margin-left: auto; display: flex; flex-direction: column;
      align-items: flex-end; gap: 1px;
    }
    .mission-id      { font-size: 0.6rem; letter-spacing: 0.15em; color: #4caf50; text-transform: uppercase; }
    .mission-elapsed { font-size: 0.62rem; letter-spacing: 0.08em; color: #888; font-variant-numeric: tabular-nums; }

    /* ── Map container ── */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #050c14;
    }

    #leaf-map {
      position: absolute; inset: 0;
      z-index: 1; opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    #leaf-map.visible { opacity: 1; pointer-events: auto; }

    #globe-canvas {
      position: absolute; inset: 0;
      z-index: 2; cursor: grab;
      transition: opacity 0.25s; display: block;
    }
    #globe-canvas.hidden { opacity: 0; pointer-events: none; }

    /* Leaflet overrides */
    .leaflet-control-attribution {
      background: rgba(10,10,10,0.7) !important; color: #666 !important; font-size: 0.5rem !important;
    }
    .leaflet-control-attribution a { color: #777 !important; }
    .leaflet-control-zoom a { background: #111 !important; color: #888 !important; border-color: #333 !important; }
    .leaflet-control-zoom a:hover { background: #1a1a1a !important; color: #ccc !important; }

    /* ── HUD ── */
    .hud {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      background: rgba(13,13,13,0.92); border: 1px solid #3a3a3a;
      font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #aaa; padding: 5px 14px; z-index: 1000;
      pointer-events: none; white-space: nowrap;
    }
    .hud-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #4caf50;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    #map-lock-label { margin-left: 4px; }

    /* Release buttons */
    .release-float {
      position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
      background: none; font-family: 'Courier New', monospace;
      font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 5px 16px; cursor: pointer; z-index: 1000; pointer-events: auto;
      display: none;
    }
    #map-release-btn        { border: 1px solid #f44336; color: #f44336; }
    #map-marine-release-btn { border: 1px solid #ff9800; color: #ff9800; top: 48px; }

    /* ── Zoom buttons ── */
    .zoom-controls {
      position: absolute; top: 12px; left: 12px;
      z-index: 1000; display: flex; flex-direction: column; gap: 2px;
    }
    .zoom-btn {
      width: 28px; height: 28px;
      background: rgba(10,10,10,0.88); border: 1px solid #3a3a3a; color: #aaa;
      font-family: 'Courier New', monospace; font-size: 1.05rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s; user-select: none;
    }
    .zoom-btn:hover  { border-color: #4caf50; color: #4caf50; }
    .zoom-btn:active { background: rgba(76,175,80,0.1); }

    /* ── Feed overlay panel ── */
    .feed-panel {
      position: absolute; top: 12px; right: 12px;
      z-index: 1000; width: 240px;
      background: rgba(10,10,10,0.92);
      border: 1px solid #333;
      display: flex; flex-direction: column;
    }

    .fp-section {
      padding: 10px 14px;
      border-bottom: 1px solid #2a2a2a;
    }
    .fp-section:last-child { border-bottom: none; }

    .fp-title {
      font-size: 0.5rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: #888; margin-bottom: 10px;
    }

    /* Feed toggle rows */
    .feed-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0;
    }
    .feed-row + .feed-row { border-top: 1px solid #222; }

    .feed-icon { font-size: 0.75rem; width: 16px; text-align: center; flex-shrink: 0; color: #888; }
    .feed-label {
      flex: 1; font-size: 0.62rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: #ccc;
    }
    .feed-count {
      font-size: 0.58rem; letter-spacing: 0.05em; color: #666;
      min-width: 28px; text-align: right;
    }
    .feed-count.active-adsb   { color: #00bcd4; }
    .feed-count.active-marine { color: #ff9800; }

    /* Toggle switch */
    .tgl { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .tgl input { opacity: 0; width: 0; height: 0; position: absolute; }
    .tgl-track {
      position: absolute; inset: 0; border-radius: 9px;
      background: #222; border: 1px solid #444;
      transition: background 0.2s, border-color 0.2s; cursor: pointer;
    }
    .tgl-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #777; transition: transform 0.2s, background 0.2s;
    }
    .tgl input:checked ~ .tgl-track { border-color: var(--tgl-color, #4caf50); }
    .tgl input:checked ~ .tgl-track .tgl-thumb {
      transform: translateX(16px); background: var(--tgl-color, #4caf50);
    }
    .tgl.adsb-tgl   { --tgl-color: #00bcd4; }
    .tgl.marine-tgl { --tgl-color: #ff9800; }

    /* Camera coords */
    .fp-coord-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .fp-coord-label {
      font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #888; width: 22px; flex-shrink: 0;
    }
    .fp-coord-input {
      flex: 1; background: #111; border: 1px solid #333; color: #ccc;
      font-family: 'Courier New', monospace; font-size: 0.65rem;
      padding: 4px 6px; outline: none; transition: border-color 0.15s;
    }
    .fp-coord-input:focus { border-color: #666; color: #eee; }
    .fp-apply {
      width: 100%; background: none; border: 1px solid #444; color: #aaa;
      font-family: 'Courier New', monospace; font-size: 0.58rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 5px 0; cursor: pointer; margin-top: 2px;
      transition: border-color 0.15s, color 0.15s;
    }
    .fp-apply:hover { border-color: #4caf50; color: #4caf50; }

    .fp-coord-display {
      font-size: 0.55rem; color: #888; letter-spacing: 0.04em;
      margin-top: 6px; line-height: 1.5;
    }

    .fp-mode-badge {
      font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: #777; border: 1px solid #3a3a3a; padding: 2px 6px;
      display: inline-block; margin-top: 5px;
    }

    /* ── Target info card ── */
    .target-card {
      position: absolute; bottom: 20px; left: 12px;
      z-index: 1000; width: 220px;
      background: rgba(10,10,10,0.95);
      border: 1px solid #3a3a3a;
      display: none; flex-direction: column;
    }
    .target-card.visible { display: flex; }

    .tc-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-bottom: 1px solid #2a2a2a;
    }
    .tc-badge {
      font-size: 0.48rem; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 2px 6px; border: 1px solid; flex-shrink: 0;
    }
    .tc-badge.adsb   { color: #00bcd4; border-color: #00bcd4; }
    .tc-badge.marine { color: #ff9800; border-color: #ff9800; }
    .tc-badge.locked { color: #4caf50; border-color: #4caf50; }

    .tc-id {
      flex: 1; font-size: 0.7rem; letter-spacing: 0.06em; color: #e0e0e0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tc-close {
      background: none; border: none; color: #777; font-size: 0.9rem;
      cursor: pointer; line-height: 1; padding: 0 2px; flex-shrink: 0;
    }
    .tc-close:hover { color: #ccc; }

    .tc-fields {
      padding: 8px 10px; display: flex; flex-direction: column; gap: 6px;
    }
    .tc-row {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .tc-label {
      font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; color: #ccc;
    }
    .tc-value { font-size: 0.68rem; color: #ccc; letter-spacing: 0.04em; }
    .tc-value.hi { color: #f0f0f0; }

    .tc-lock {
      margin: 4px 10px 10px;
      background: none; border: 1px solid #444; color: #aaa;
      font-family: 'Courier New', monospace; font-size: 0.58rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 5px 0; cursor: pointer; width: calc(100% - 20px);
      transition: border-color 0.15s, color 0.15s;
    }
    .tc-lock:hover { border-color: #4caf50; color: #4caf50; }
    .tc-lock.locked { border-color: #f44336; color: #f44336; }
    .tc-lock.locked:hover { border-color: #f44336; color: #f44336; }

    /* ── Tracking conditions section ── */
    .trk-row {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 0;
    }
    .trk-label {
      font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: #aaa; min-width: 52px; flex-shrink: 0;
    }
    .trk-check {
      font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: #aaa; display: flex; align-items: center; gap: 4px;
      cursor: pointer; min-width: 52px; flex-shrink: 0;
    }
    input[type="checkbox"] { accent-color: #ffd700; cursor: pointer; }
    .trk-input {
      background: #111; border: 1px solid #333; color: #ccc;
      font-family: 'Courier New', monospace; font-size: 0.6rem;
      padding: 3px 5px; outline: none; width: 54px;
      transition: border-color 0.15s;
    }
    .trk-input:focus { border-color: #666; }
    .trk-input.wide { width: 100%; flex: 1; }
    .trk-sep { font-size: 0.6rem; color: #666; }
    .trk-range { display: none; align-items: center; gap: 4px; }
    .trk-range.visible { display: flex; }
    .trk-select {
      flex: 1; background: #111; border: 1px solid #333; color: #ccc;
      font-family: 'Courier New', monospace; font-size: 0.6rem;
      padding: 3px 5px; outline: none; cursor: pointer;
    }
    .trk-select:focus { border-color: #666; }
    .trk-arm {
      width: 100%; margin-top: 10px;
      background: none; border: 1px solid #555; color: #aaa;
      font-family: 'Courier New', monospace; font-size: 0.58rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 0; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .trk-arm:hover              { border-color: #ffd700; color: #ffd700; }
    .trk-arm.armed              { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.06); }
    .trk-status {
      font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #555; margin-top: 6px; text-align: center; line-height: 1.4;
    }
    .trk-status.searching { color: #888; }
    .trk-status.tracking  { color: #ffd700; }
  </style>
</head>
<body>
<div class="classif-banner top">UNCLASSIFIED // SIMULATION // NOT FOR OPERATIONAL USE</div>
<div class="classif-banner bottom">UNCLASSIFIED // SIMULATION // NOT FOR OPERATIONAL USE</div>

<header>
  <h1>TrackAware</h1>
  <div class="mission-info">
    <span class="mission-id">{{ mission_id }}</span>
    <span class="mission-elapsed" id="mission-elapsed">00:00:00</span>
  </div>
</header>

<div id="map-container">

  <!-- Leaflet tile map -->
  <div id="leaf-map"></div>

  <!-- Zoom controls -->
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="mapZoomIn()">+</button>
    <button class="zoom-btn" onclick="mapZoomOut()">&minus;</button>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-dot"></div>
    Live
    <span id="map-lock-label"></span>
  </div>

  <!-- Release buttons -->
  <button id="map-release-btn"        class="release-float" onclick="mapReleaseFollow()">⊗ Release Target</button>
  <button id="map-marine-release-btn" class="release-float" onclick="mapMarineReleaseFollow()">⊗ Release Target</button>

  <!-- Target info card -->
  <div class="target-card" id="target-card">
    <div class="tc-header">
      <span class="tc-badge" id="tc-badge">—</span>
      <span class="tc-id"   id="tc-id">—</span>
      <button class="tc-close" onclick="closeTargetCard()">×</button>
    </div>
    <div class="tc-fields" id="tc-fields"></div>
    <button class="tc-lock" id="tc-lock" onclick="lockFromCard()">⊕ Lock Target</button>
  </div>

  <!-- Feed overlay panel -->
  <div class="feed-panel">

    <div class="fp-section">
      <div class="fp-title">Feeds</div>

      <div class="feed-row">
        <span class="feed-icon">✈</span>
        <span class="feed-label">Air Traffic</span>
        <span class="feed-count" id="adsb-count">—</span>
        <label class="tgl adsb-tgl">
          <input type="checkbox" id="adsb-toggle" onchange="toggleADSB(this.checked)">
          <div class="tgl-track"><div class="tgl-thumb"></div></div>
        </label>
      </div>

      <div class="feed-row">
        <span class="feed-icon">⚓</span>
        <span class="feed-label">Ocean Traffic</span>
        <span class="feed-count" id="marine-count">—</span>
        <label class="tgl marine-tgl">
          <input type="checkbox" id="marine-toggle" onchange="toggleMarine(this.checked)">
          <div class="tgl-track"><div class="tgl-thumb"></div></div>
        </label>
      </div>
    </div>

    <div class="fp-section">
      <div class="fp-title">Camera</div>
      <div class="fp-coord-row">
        <span class="fp-coord-label">Lat</span>
        <input id="inp-lat" class="fp-coord-input" type="number" step="0.0001" value="34.1425">
      </div>
      <div class="fp-coord-row">
        <span class="fp-coord-label">Lon</span>
        <input id="inp-lon" class="fp-coord-input" type="number" step="0.0001" value="-118.2551">
      </div>
      <button class="fp-apply" onclick="applyCoords()">Apply</button>
      <div class="fp-coord-display" id="coord-display">Glendale, CA</div>
      <div class="fp-mode-badge" id="mode-badge">Globe</div>
    </div>

    <div class="fp-section">
      <div class="fp-title">Tracking Conditions</div>

      <div class="trk-row">
        <span class="trk-label">Target</span>
        <select id="trk-type" class="trk-select" onchange="onTrkTypeChange()">
          <option value="adsb">Air Traffic</option>
          <option value="marine">Ocean Traffic</option>
        </select>
      </div>

      <div class="trk-row">
        <label class="trk-check"><input type="checkbox" id="trk-spd-en" onchange="onTrkCheckChange('spd')"> Speed</label>
        <div class="trk-range" id="trk-spd-range">
          <input type="number" id="trk-spd-min" class="trk-input" placeholder="min kt" min="0">
          <span class="trk-sep">–</span>
          <input type="number" id="trk-spd-max" class="trk-input" placeholder="max kt" min="0">
        </div>
      </div>

      <div class="trk-row" id="trk-hdg-row">
        <label class="trk-check"><input type="checkbox" id="trk-hdg-en" onchange="onTrkCheckChange('hdg')"> Heading</label>
        <div class="trk-range" id="trk-hdg-range">
          <input type="number" id="trk-hdg-min" class="trk-input" placeholder="min °" min="0" max="360">
          <span class="trk-sep">–</span>
          <input type="number" id="trk-hdg-max" class="trk-input" placeholder="max °" min="0" max="360">
        </div>
      </div>

      <div class="trk-row" id="trk-alt-row">
        <label class="trk-check"><input type="checkbox" id="trk-alt-en" onchange="onTrkCheckChange('alt')"> Altitude</label>
        <div class="trk-range" id="trk-alt-range">
          <input type="number" id="trk-alt-min" class="trk-input" placeholder="min ft" step="500">
          <span class="trk-sep">–</span>
          <input type="number" id="trk-alt-max" class="trk-input" placeholder="max ft" step="500">
        </div>
      </div>

      <div class="trk-row">
        <span class="trk-label" id="trk-prefix-label">Callsign</span>
        <input type="text" id="trk-prefix" class="trk-input wide" placeholder="e.g. UAL, N" maxlength="12">
      </div>

      <button class="trk-arm" id="trk-arm" onclick="toggleArming()">Arm Tracking</button>
      <div class="trk-status" id="trk-status">Disarmed</div>
    </div>

  </div>

</div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const STORAGE_KEY  = 'trackvision_camera_coords';
  const BOX_KM       = 48.28;  // 30 miles
  const TRACK_KM     = 5;      // tracking box size
  const GLENDALE     = { lat: 34.1425, lon: -118.2551 };
  const GLOBE_TO_MAP = 14000;
  const MAP_TO_GLOBE = 7;

  // ── State ──────────────────────────────────────────────────────────────────
  let currentCoords  = loadCoords();
  let mode           = 'globe';
  let globeAnimating = false;
  let adsbEnabled    = false;
  let marineEnabled  = false;
  let _cardType      = null;   // 'adsb' | 'marine'
  let _cardId        = null;   // icao24 or mmsi

  let trackingArmed    = false;
  const trackingTargets = new Map();  // id → {type, id, lat, lon}
  const trackRects      = new Map();  // id → Leaflet rectangle

  let adsbFlights    = [];
  let adsbFollowIcao = null;
  const flightMarkers = new Map();

  let marineVessels    = [];
  let marineFollowMmsi = null;
  const vesselMarkers  = new Map();

  // ── Geo helpers ───────────────────────────────────────────────────────────
  function kmToDegLat(km) { return km / 111.32; }
  function kmToDegLon(km, lat) { return km / (111.32 * Math.cos(lat * Math.PI / 180)); }

  function boxGeoJSON(lat, lon) {
    const hLat = kmToDegLat(BOX_KM / 2), hLon = kmToDegLon(BOX_KM / 2, lat);
    return {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [lon - hLon, lat - hLat], [lon + hLon, lat - hLat],
          [lon + hLon, lat + hLat], [lon - hLon, lat + hLat],
          [lon - hLon, lat - hLat],
        ]],
      },
    };
  }

  function leafBounds(lat, lon) {
    const hLat = kmToDegLat(BOX_KM / 2), hLon = kmToDegLon(BOX_KM / 2, lat);
    return [[lat - hLat, lon - hLon], [lat + hLat, lon + hLon]];
  }

  // ── D3 Globe ───────────────────────────────────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.id = 'globe-canvas';
  document.getElementById('map-container').appendChild(canvas);

  const projection = d3.geoOrthographic()
    .clipAngle(90).precision(0.3)
    .rotate([-currentCoords.lon, -currentCoords.lat, 0]);

  const graticuleData = d3.geoGraticule()();
  let landData = null, bordersData = null;
  let currentGeoBox = boxGeoJSON(currentCoords.lat, currentCoords.lon);

  function draw() {
    const ctx  = canvas.getContext('2d');
    const w    = canvas.width, h = canvas.height;
    const path = d3.geoPath().projection(projection).context(ctx);
    ctx.clearRect(0, 0, w, h);

    ctx.beginPath(); path({ type: 'Sphere' });
    ctx.fillStyle = '#050c14'; ctx.fill();

    ctx.beginPath(); path(graticuleData);
    ctx.strokeStyle = 'rgba(15,35,55,0.7)'; ctx.lineWidth = 0.4; ctx.stroke();

    if (landData)    { ctx.beginPath(); path(landData);    ctx.fillStyle = '#0d1a0e'; ctx.fill(); }
    if (bordersData) { ctx.beginPath(); path(bordersData); ctx.strokeStyle = '#1a3040'; ctx.lineWidth = 0.5; ctx.stroke(); }

    ctx.beginPath(); path(currentGeoBox);
    ctx.strokeStyle = '#2196f3'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = 'rgba(33,150,243,0.08)'; ctx.fill();

    const cam = projection([currentCoords.lon, currentCoords.lat]);
    if (cam) {
      ctx.strokeStyle = 'rgba(33,150,243,0.55)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cam[0]-8, cam[1]); ctx.lineTo(cam[0]+8, cam[1]);
      ctx.moveTo(cam[0], cam[1]-8); ctx.lineTo(cam[0], cam[1]+8);
      ctx.stroke();
    }

    adsbFlights.forEach(f => {
      const p = projection([f.lon, f.lat]);
      if (!p) return;
      const [fx, fy] = p;
      const locked = f.icao24 === adsbFollowIcao;
      const color  = locked ? '#4caf50' : '#00bcd4';
      const hdgRad = ((f.heading || 0) * Math.PI) / 180;
      ctx.save(); ctx.translate(fx, fy); ctx.rotate(hdgRad);
      ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(-3.5, 4); ctx.lineTo(3.5, 4);
      ctx.closePath(); ctx.fillStyle = color; ctx.fill(); ctx.restore();
      if (f.callsign) { ctx.font = '9px Courier New'; ctx.fillStyle = color; ctx.fillText(f.callsign, fx + 8, fy + 3); }
    });

    marineVessels.forEach(v => {
      const p = projection([v.lon, v.lat]);
      if (!p) return;
      const [vx, vy] = p;
      const locked = v.mmsi === marineFollowMmsi;
      const color  = locked ? '#4caf50' : '#ff9800';
      const hdg    = (v.heading != null) ? v.heading : (v.cog || 0);
      const hdgRad = hdg * Math.PI / 180;
      ctx.save(); ctx.translate(vx, vy); ctx.rotate(hdgRad);
      ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(4, 0); ctx.lineTo(0, 5); ctx.lineTo(-4, 0);
      ctx.closePath(); ctx.fillStyle = color; ctx.fill(); ctx.restore();
      if (v.name) { ctx.font = '9px Courier New'; ctx.fillStyle = color; ctx.fillText(v.name, vx + 8, vy + 3); }
    });

    // Tracking boxes (5km × 5km, yellow, one per tracked target)
    trackingTargets.forEach(tgt => {
      const box = trackingBoxGeoJSON(tgt.lat, tgt.lon);
      ctx.beginPath(); path(box);
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = 'rgba(255,215,0,0.06)'; ctx.fill();
    });

    // Selection ring
    if (_cardId) {
      const pool  = _cardType === 'adsb' ? adsbFlights : marineVessels;
      const key   = _cardType === 'adsb' ? 'icao24' : 'mmsi';
      const tgt   = pool.find(t => t[key] === _cardId);
      if (tgt) {
        const sp = projection([tgt.lon, tgt.lat]);
        if (sp) {
          ctx.beginPath(); ctx.arc(sp[0], sp[1], 11, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 1.5; ctx.stroke();
        }
      }
    }

    ctx.beginPath(); path({ type: 'Sphere' });
    ctx.strokeStyle = 'rgba(25,65,120,0.35)'; ctx.lineWidth = 4; ctx.stroke();
    ctx.strokeStyle = 'rgba(30,60,100,0.7)';  ctx.lineWidth = 1; ctx.stroke();
  }

  function resizeGlobe() {
    const p = canvas.parentElement;
    if (!p) return;
    const w = p.clientWidth, h = p.clientHeight;
    if (!w || !h) return;
    canvas.width = w; canvas.height = h;
    if (!canvas._initScale) { projection.scale(Math.min(w, h) * 0.44); canvas._initScale = true; }
    projection.translate([w / 2, h / 2]);
    draw();
  }

  // Drag
  let dragging = false, dragStart, rotStart;
  canvas.addEventListener('mousedown', e => {
    if (globeAnimating) return;
    dragging = true; dragStart = [e.clientX, e.clientY]; rotStart = projection.rotate().slice();
    canvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const s = projection.scale();
    projection.rotate([rotStart[0] + (e.clientX - dragStart[0]) * 90 / s, rotStart[1] - (e.clientY - dragStart[1]) * 90 / s]);
    draw();
  });
  window.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });

  // Globe click — hit-test markers, open info card
  canvas.addEventListener('click', e => {
    if (dragging) return;
    const r  = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const HIT = 10;

    for (const f of adsbFlights) {
      const p = projection([f.lon, f.lat]);
      if (p && Math.hypot(p[0] - mx, p[1] - my) < HIT) {
        showTargetCard('adsb', f.icao24); return;
      }
    }
    for (const v of marineVessels) {
      const p = projection([v.lon, v.lat]);
      if (p && Math.hypot(p[0] - mx, p[1] - my) < HIT) {
        showTargetCard('marine', v.mmsi); return;
      }
    }
    closeTargetCard();
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const ns = Math.max(80, projection.scale() * (e.deltaY > 0 ? 0.85 : 1.18));
    projection.scale(ns);
    if (ns >= GLOBE_TO_MAP) switchToMap(); else draw();
  }, { passive: false });

  function flyTo(lat, lon) {
    globeAnimating = true; canvas.style.cursor = 'wait';
    const r0 = projection.rotate(), r1 = [-lon, -lat, 0], s0 = projection.scale();
    const s1 = Math.max(s0, Math.min(canvas.width, canvas.height) * 3);
    const iR = d3.interpolate(r0, r1), iS = d3.interpolateNumber(s0, s1);
    const dur = 1200; let t0 = null;
    (function step(ts) {
      if (!t0) t0 = ts;
      const t = Math.min((ts - t0) / dur, 1), e = d3.easeCubicInOut(t);
      projection.rotate(iR(e)).scale(iS(e));
      if (projection.scale() >= GLOBE_TO_MAP) { switchToMap(); return; }
      draw();
      if (t < 1) requestAnimationFrame(step);
      else { globeAnimating = false; canvas.style.cursor = 'grab'; }
    })(performance.now());
  }

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(world => {
    landData    = topojson.feature(world, world.objects.land);
    bordersData = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
    draw();
  });

  // ── Leaflet ───────────────────────────────────────────────────────────────
  const TILE_URL  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
  const TILE_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>';

  const leafMap = L.map('leaf-map', { zoomControl: false });
  L.tileLayer(TILE_URL, { attribution: TILE_ATTR, maxZoom: 19 }).addTo(leafMap);

  const boxStyle = { color: '#2196f3', weight: 2, fillColor: '#2196f3', fillOpacity: 0.08 };
  let rect = null;

  const flightLayer = L.layerGroup().addTo(leafMap);
  const vesselLayer = L.layerGroup().addTo(leafMap);

  leafMap.on('zoomend', () => {
    if (mode === 'map' && leafMap.getZoom() < MAP_TO_GLOBE) switchToGlobe(leafMap);
  });

  function makeFlightIcon(heading, locked, selected = false) {
    const color = locked ? '#4caf50' : '#00bcd4';
    const h     = heading || 0;
    const ring  = selected ? `<circle cx="0" cy="0" r="10" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.85"/>` : '';
    return L.divIcon({
      className: '',
      html: `<svg width="16" height="16" viewBox="-8 -8 16 16" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;transform:rotate(${h}deg)">${ring}<polygon points="0,-7 -4,5 4,5" fill="${color}"/></svg>`,
      iconSize: [16, 16], iconAnchor: [8, 8],
    });
  }

  function makeVesselIcon(heading, locked, selected = false) {
    const color = locked ? '#4caf50' : '#ff9800';
    const h     = (heading != null) ? heading : 0;
    const ring  = selected ? `<circle cx="0" cy="0" r="9" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.85"/>` : '';
    return L.divIcon({
      className: '',
      html: `<svg width="14" height="14" viewBox="-7 -7 14 14" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;transform:rotate(${h}deg)">${ring}<polygon points="0,-6 5,0 0,6 -5,0" fill="${color}"/></svg>`,
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
  }

  function updateLeafletBox(lat, lon, fit = false) {
    const bounds = leafBounds(lat, lon);
    if (rect) leafMap.removeLayer(rect);
    rect = L.rectangle(bounds, boxStyle).addTo(leafMap);
    if (fit) leafMap.fitBounds(bounds, { padding: [40, 40] });
  }

  // ── Globe ↔ Map switching ─────────────────────────────────────────────────
  function d3ScaleToLeafZoom(s) { return Math.min(18, Math.max(1, Math.round(Math.log2(2 * Math.PI * s / 256)))); }
  function leafZoomToD3Scale(z) { return 256 * Math.pow(2, z) / (2 * Math.PI); }

  function switchToMap() {
    if (mode === 'map') return;
    mode = 'map'; globeAnimating = false;
    const rot = projection.rotate();
    leafMap.setView([-rot[1], -rot[0]], d3ScaleToLeafZoom(projection.scale()), { animate: false });
    updateLeafletBox(currentCoords.lat, currentCoords.lon, false);
    document.getElementById('leaf-map').classList.add('visible');
    canvas.classList.add('hidden');
    document.getElementById('mode-badge').textContent = 'Map';
    setTimeout(() => leafMap.invalidateSize(), 30);
  }

  function switchToGlobe(fromLeaf) {
    if (mode === 'globe') return;
    mode = 'globe';
    const c = fromLeaf.getCenter();
    projection.rotate([-c.lng, -c.lat, 0]).scale(leafZoomToD3Scale(fromLeaf.getZoom()));
    document.getElementById('leaf-map').classList.remove('visible');
    canvas.classList.remove('hidden');
    document.getElementById('mode-badge').textContent = 'Globe';
    delete canvas._initScale;
    resizeGlobe();
  }

  function mapZoomIn() {
    if (mode === 'globe') {
      const ns = projection.scale() * 1.4;
      projection.scale(ns);
      if (ns >= GLOBE_TO_MAP) switchToMap(); else draw();
    } else { leafMap.zoomIn(); }
  }
  function mapZoomOut() {
    if (mode === 'globe') { projection.scale(Math.max(80, projection.scale() / 1.4)); draw(); }
    else { leafMap.zoomOut(); }
  }

  // ── Feed toggles ──────────────────────────────────────────────────────────
  async function toggleADSB(enabled) {
    adsbEnabled = enabled;
    if (enabled) {
      await fetch('/adsb/mode', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },

      flightMarkers.forEach(m => flightLayer.removeLayer(m)); flightMarkers.clear();
      document.getElementById('adsb-count').textContent = '—';

      document.getElementById('map-release-btn').style.display = 'none';

  // ── ADS-B polling ─────────────────────────────────────────────────────────
  function updateFlightMarkers() {
    const seen = new Set(adsbFlights.map(f => f.icao24));
    flightMarkers.forEach((m, icao) => { if (!seen.has(icao)) { flightLayer.removeLayer(m); flightMarkers.delete(icao); } });
    adsbFlights.forEach(f => {
      const icon = makeFlightIcon(f.heading, f.icao24 === adsbFollowIcao, _cardType === 'adsb' && f.icao24 === _cardId);
      if (flightMarkers.has(f.icao24)) flightMarkers.get(f.icao24).setLatLng([f.lat, f.lon]).setIcon(icon);
      else {
        const mk = L.marker([f.lat, f.lon], { icon }).addTo(flightLayer);
        mk.on('click', () => showTargetCard('adsb', f.icao24));
        flightMarkers.set(f.icao24, mk);
      }
    });
  }

  async function pollADSB() {
    if (!adsbEnabled) return;
    try {
      const data = await fetch('/adsb/flights').then(r => r.json());
      adsbFlights    = data.flights || [];
      adsbFollowIcao = data.follow_icao || null;

      const n = adsbFlights.length;
      const cEl = document.getElementById('adsb-count');
      cEl.textContent = n;
      cEl.className = n > 0 ? 'feed-count active-adsb' : 'feed-count';

      if (data.follow_icao && data.center) {
        const { lat, lon } = data.center;
        if (lat !== currentCoords.lat || lon !== currentCoords.lon) {
          currentCoords = { lat, lon }; saveCoords(lat, lon);
          currentGeoBox = boxGeoJSON(lat, lon);
          if (mode === 'globe') draw(); else updateLeafletBox(lat, lon);
        }
      }

      updateFlightMarkers();
      if (mode === 'globe') draw();

      document.getElementById('map-release-btn').style.display = adsbFollowIcao ? '' : 'none';
      const f = adsbFlights.find(f => f.icao24 === adsbFollowIcao);
      const lbl = document.getElementById('map-lock-label');
      if (adsbFollowIcao) {
        lbl.textContent = `LOCKED: ${adsbFollowIcao}${f?.callsign ? ' / ' + f.callsign : ''}`;
        lbl.style.color = '#4caf50';
      } else if (!marineFollowMmsi) {
        lbl.textContent = '';
      }
      checkTracking();
    } catch (_) {}
  }

  // ── Marine polling ────────────────────────────────────────────────────────
  function updateVesselMarkers() {
    const seen = new Set(marineVessels.map(v => v.mmsi));
    vesselMarkers.forEach((m, mmsi) => { if (!seen.has(mmsi)) { vesselLayer.removeLayer(m); vesselMarkers.delete(mmsi); } });
    marineVessels.forEach(v => {
      const hdg  = v.heading != null ? v.heading : v.cog;
      const icon = makeVesselIcon(hdg, v.mmsi === marineFollowMmsi, _cardType === 'marine' && v.mmsi === _cardId);
      if (vesselMarkers.has(v.mmsi)) vesselMarkers.get(v.mmsi).setLatLng([v.lat, v.lon]).setIcon(icon);
      else {
        const mk = L.marker([v.lat, v.lon], { icon }).addTo(vesselLayer);
        mk.on('click', () => showTargetCard('marine', v.mmsi));
        vesselMarkers.set(v.mmsi, mk);
      }

  // ── Coord management ──────────────────────────────────────────────────────
  function loadCoords() {
    try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (s?.lat && s?.lon) return s; } catch (_) {}
    return { ...GLENDALE };

  function saveCoords(lat, lon) { localStorage.setItem(STORAGE_KEY, JSON.stringify({ lat, lon })); }
  function updateDisplay(lat, lon) {

      `${lat.toFixed(4)}° N, ${Math.abs(lon).toFixed(4)}° ${lon < 0 ? 'W' : 'E'}`;

  async function mapReleaseFollow() {

  // ── Cross-window coord sync ───────────────────────────────────────────────
  window.addEventListener('storage', e => {
    if (e.key !== STORAGE_KEY) return;
    const { lat, lon } = JSON.parse(e.newValue);
    currentCoords = { lat, lon };
    document.getElementById('inp-lat').value = lat;
    document.getElementById('inp-lon').value = lon;
    updateDisplay(lat, lon);
    currentGeoBox = boxGeoJSON(lat, lon);
    if (mode === 'globe') draw(); else updateLeafletBox(lat, lon);

  // ── Init ──────────────────────────────────────────────────────────────────
  document.getElementById('inp-lat').value = currentCoords.lat;
  document.getElementById('inp-lon').value = currentCoords.lon;
  updateDisplay(currentCoords.lat, currentCoords.lon);
  window.addEventListener('resize', resizeGlobe);
  resizeGlobe();

  // ── Tracking conditions ───────────────────────────────────────────────────
  function trackingBoxGeoJSON(lat, lon) {
    const hLat = kmToDegLat(TRACK_KM / 2);
    const hLon = kmToDegLon(TRACK_KM / 2, lat);
    return {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [lon - hLon, lat - hLat], [lon + hLon, lat - hLat],
          [lon + hLon, lat + hLat], [lon - hLon, lat + hLat],
          [lon - hLon, lat - hLat],
        ]],
      },
    };
  }

  function matchesTracking(item, type) {
    if (document.getElementById('trk-spd-en').checked) {
      const spd = item.speed_kt, smin = parseFloat(document.getElementById('trk-spd-min').value), smax = parseFloat(document.getElementById('trk-spd-max').value);
      if (spd != null && !isNaN(smin) && spd < smin) return false;
      if (spd != null && !isNaN(smax) && spd > smax) return false;
    }
    if (type === 'adsb') {
      if (document.getElementById('trk-hdg-en').checked) {
        const hdg = item.heading, hmin = parseFloat(document.getElementById('trk-hdg-min').value), hmax = parseFloat(document.getElementById('trk-hdg-max').value);
        if (hdg != null && !isNaN(hmin) && hdg < hmin) return false;
        if (hdg != null && !isNaN(hmax) && hdg > hmax) return false;
      }
      if (document.getElementById('trk-alt-en').checked) {
        const alt = item.alt_ft, amin = parseFloat(document.getElementById('trk-alt-min').value), amax = parseFloat(document.getElementById('trk-alt-max').value);
        if (alt != null && !isNaN(amin) && alt < amin) return false;
        if (alt != null && !isNaN(amax) && alt > amax) return false;
      }
      const pfx = document.getElementById('trk-prefix').value.trim().toUpperCase();
      if (pfx && !(item.callsign || '').toUpperCase().startsWith(pfx)) return false;
    } else {
      const pfx = document.getElementById('trk-prefix').value.trim().toUpperCase();
      if (pfx && !(item.name || '').toUpperCase().startsWith(pfx)) return false;
    }
    return true;
  }

  function checkTracking() {
    if (!trackingArmed) return;
    const type  = document.getElementById('trk-type').value;
    const pool  = type === 'adsb' ? adsbFlights : marineVessels;
    const idKey = type === 'adsb' ? 'icao24' : 'mmsi';

    // Update or evict existing tracked targets
    trackingTargets.forEach((tgt, id) => {
      const cur = pool.find(t => t[idKey] === id);
      if (!cur) {
        if (type === 'adsb') {
          // Aircraft left the 30mi box — keep box at last known position, wait for landing
          tgt.stale = true;
        } else {
          // Marine vessel — drop when it leaves the box
          _removeTrackTarget(id);
        }
      } else if (type === 'adsb' && !(cur.alt_ft > 0)) {
        // Aircraft on the ground — stop tracking
        _removeTrackTarget(id);
      } else {
        // Active — update position
        tgt.lat = cur.lat; tgt.lon = cur.lon; tgt.stale = false;
        _updateTrackRect(id, cur.lat, cur.lon);
      }
    });

    // Pick up any new matches
    pool.forEach(item => {
      const id = item[idKey];
      if (trackingTargets.has(id)) return;                   // already tracked
      if (type === 'adsb' && !(item.alt_ft > 0)) return;    // skip ground traffic
      if (matchesTracking(item, type)) {
        trackingTargets.set(id, { type, id, lat: item.lat, lon: item.lon });
        _updateTrackRect(id, item.lat, item.lon);
      }
    });

    if (mode === 'globe') draw();
    _updateTrackStatus();
  }

  function _updateTrackRect(id, lat, lon) {
    const hLat = kmToDegLat(TRACK_KM / 2), hLon = kmToDegLon(TRACK_KM / 2, lat);
    const bounds = [[lat - hLat, lon - hLon], [lat + hLat, lon + hLon]];
    if (trackRects.has(id)) {
      trackRects.get(id).setBounds(bounds);
    } else {
      trackRects.set(id, L.rectangle(bounds, {
        color: '#ffd700', weight: 2, fillColor: '#ffd700', fillOpacity: 0.06, interactive: false,
      }).addTo(leafMap));
    }
  }

  function _removeTrackTarget(id) {
    trackingTargets.delete(id);
    if (trackRects.has(id)) { leafMap.removeLayer(trackRects.get(id)); trackRects.delete(id); }
  }

  function _clearAllTracks() {
    trackingTargets.clear();
    trackRects.forEach(r => leafMap.removeLayer(r));
    trackRects.clear();
    if (mode === 'globe') draw();
  }

  function _updateTrackStatus() {
    const n = trackingTargets.size;
    if (n === 0) {
      _setTrackStatus('Searching...', 'searching');
    } else {
      const ids = Array.from(trackingTargets.values())
        .map(t => t.type === 'adsb'
          ? (adsbFlights.find(f => f.icao24 === t.id)?.callsign || t.id)
          : (marineVessels.find(v => v.mmsi === t.id)?.name || t.id));
      _setTrackStatus(n <= 3 ? ids.join(', ') : `${n} targets`, 'tracking');
    }
  }

  function _setTrackStatus(msg, cls = '') {
    const el = document.getElementById('trk-status');
    el.textContent = msg;
    el.className = 'trk-status' + (cls ? ' ' + cls : '');
  }

  function toggleArming() {
    trackingArmed = !trackingArmed;
    const btn = document.getElementById('trk-arm');
    if (trackingArmed) {
      btn.textContent = 'Disarm';
      btn.classList.add('armed');
      _setTrackStatus('Searching...', 'searching');
      checkTracking();
    } else {
      btn.textContent = 'Arm Tracking';
      btn.classList.remove('armed');
      _clearAllTracks();
      _setTrackStatus('Disarmed');
    }
  }

  function onTrkTypeChange() {
    const isAir = document.getElementById('trk-type').value === 'adsb';
    document.getElementById('trk-hdg-row').style.display = isAir ? '' : 'none';
    document.getElementById('trk-alt-row').style.display = isAir ? '' : 'none';
    document.getElementById('trk-prefix-label').textContent = isAir ? 'Callsign' : 'Name';
    document.getElementById('trk-prefix').placeholder = isAir ? 'e.g. UAL, N' : 'e.g. MAERSK';
    if (trackingArmed) { _clearAllTracks(); _setTrackStatus('Searching...', 'searching'); checkTracking(); }
  }

  function onTrkCheckChange(key) {
    document.getElementById(`trk-${key}-range`).classList.toggle('visible', document.getElementById(`trk-${key}-en`).checked);
  }

  // ── Target info card ─────────────────────────────────────────────────────
  function _refreshMarker(type, id) {
    if (type === 'adsb') {
      const f = adsbFlights.find(f => f.icao24 === id);
      if (f && flightMarkers.has(id))
        flightMarkers.get(id).setIcon(makeFlightIcon(f.heading, f.icao24 === adsbFollowIcao, _cardType === 'adsb' && id === _cardId));
    } else {
      const v = marineVessels.find(v => v.mmsi === id);
      if (v && vesselMarkers.has(id))
        vesselMarkers.get(id).setIcon(makeVesselIcon(v.heading != null ? v.heading : v.cog, v.mmsi === marineFollowMmsi, _cardType === 'marine' && id === _cardId));
    }
  }

  function showTargetCard(type, id) {
    const prevType = _cardType, prevId = _cardId;
    _cardType = type; _cardId = id;
    // Deselect old marker, select new one
    if (prevId && (prevType !== type || prevId !== id)) _refreshMarker(prevType, prevId);
    _refreshMarker(type, id);
    if (mode === 'globe') draw();

    const card   = document.getElementById('target-card');
    const badge  = document.getElementById('tc-badge');
    const idEl   = document.getElementById('tc-id');
    const fields = document.getElementById('tc-fields');
    const lockBtn = document.getElementById('tc-lock');

    if (type === 'adsb') {
      const f = adsbFlights.find(f => f.icao24 === id);
      if (!f) return;
      const isLocked = f.icao24 === adsbFollowIcao;
      badge.textContent = isLocked ? 'LOCKED' : 'FLIGHT';
      badge.className   = 'tc-badge ' + (isLocked ? 'locked' : 'adsb');
      idEl.textContent  = f.callsign || f.icao24;
      fields.innerHTML  = row('ICAO',     f.icao24,      true)
                        + row('Callsign', f.callsign || '—')
                        + row('Type',     f.type     || '—')
                        + row('Altitude', f.alt_ft > 0 ? f.alt_ft.toLocaleString() + ' ft' : 'GND')
                        + row('Heading',  f.heading  != null ? Math.round(f.heading)  + '°' : '—')
                        + row('Speed',    f.speed_kt != null ? Math.round(f.speed_kt) + ' kt' : '—');
      lockBtn.textContent = isLocked ? '⊗ Release Target' : '⊕ Lock Target';
      lockBtn.className   = 'tc-lock' + (isLocked ? ' locked' : '');
    } else {
      const v = marineVessels.find(v => v.mmsi === id);
      if (!v) return;
      const isLocked = v.mmsi === marineFollowMmsi;
      badge.textContent = isLocked ? 'LOCKED' : 'VESSEL';
      badge.className   = 'tc-badge ' + (isLocked ? 'locked' : 'marine');
      idEl.textContent  = v.name || v.mmsi;
      const hdg = v.heading != null ? Math.round(v.heading) + '°'
                : v.cog    != null ? Math.round(v.cog)     + '° (COG)' : '—';
      fields.innerHTML  = row('MMSI',    v.mmsi,           true)
                        + row('Name',    v.name  || '—')
                        + row('Speed',   v.speed_kt != null ? v.speed_kt.toFixed(1) + ' kt' : '—')
                        + row('Heading', hdg)
                        + row('Status',  _navStatus(v.status));
      lockBtn.textContent = isLocked ? '⊗ Release Target' : '⊕ Lock Target';
      lockBtn.className   = 'tc-lock' + (isLocked ? ' locked' : '');
    }

    card.classList.add('visible');
  }

  function row(label, value, hi = false) {
    return `<div class="tc-row"><span class="tc-label">${label}</span><span class="tc-value${hi ? ' hi' : ''}">${value}</span></div>`;
  }

  function _navStatus(code) {
    const s = ['Underway (engine)', 'Anchored', 'Not under command', 'Restricted',
               'Constrained by draft', 'Moored', 'Aground', 'Fishing', 'Sailing'];
    return s[code] || (code != null ? `Status ${code}` : '—');
  }

  function closeTargetCard() {
    document.getElementById('target-card').classList.remove('visible');
    const prevType = _cardType, prevId = _cardId;
    _cardType = null; _cardId = null;
    if (prevId) _refreshMarker(prevType, prevId);
    if (mode === 'globe') draw();
  }

  async function lockFromCard() {
    if (!_cardType || !_cardId) return;
    if (_cardType === 'adsb') {
      const isLocked = _cardId === adsbFollowIcao;
      if (isLocked) {
        await fetch('/adsb/follow', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ icao24: null }) });
        adsbFollowIcao = null;
        document.getElementById('map-release-btn').style.display = 'none';
        if (!marineFollowMmsi) document.getElementById('map-lock-label').textContent = '';
        updateFlightMarkers();
      } else {
        await fetch('/adsb/follow', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ icao24: _cardId }) });
        adsbFollowIcao = _cardId;
      }
    } else {
      const isLocked = _cardId === marineFollowMmsi;
      if (isLocked) {
        await fetch('/marine/follow', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mmsi: null }) });
        marineFollowMmsi = null;
        document.getElementById('map-marine-release-btn').style.display = 'none';
        if (!adsbFollowIcao) document.getElementById('map-lock-label').textContent = '';
        updateVesselMarkers();
        if (mode === 'globe') draw();
      } else {
        await fetch('/marine/follow', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mmsi: _cardId }) });
        marineFollowMmsi = _cardId;
      }
    }
    showTargetCard(_cardType, _cardId);
  }

  // ── Mission elapsed timer ─────────────────────────────────────────────────
  (function() {
    const start = {{ started_at }};
    function tick() {
      const s  = Math.max(0, Math.floor(Date.now() / 1000 - start));
      const hh = String(Math.floor(s / 3600)).padStart(2, '0');
      const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      document.getElementById('mission-elapsed').textContent = `${hh}:${mm}:${ss}`;
    }
    tick(); setInterval(tick, 1000);
  })();
</script>
</body>
